<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌹 LG筑梦电子无限临时邮箱 system 🌹</title>
    <style>
        :root { 
            --rose-main: #ff69b4; --rose-dark: #d81b60; --rose-bg: transparent; --rose-border: #ffb6c1; 
            --blue-main: #0078D7; --blue-dark: #005a9e; --green-main: #4caf50; --green-dark: #388e3c;
            --purple-main: #da70d6; --purple-dark: #b359b0;
        }

        /* --- 绝对属于你的玫瑰背景 --- */
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: url('./bg.JPG') no-repeat center center fixed !important;
            background-size: cover !important;
        }
        
        .main-container, .wrapper, #app { background-color: transparent !important; }
        
        /* 1. 最外层的大框：深色黑透 + 10px毛玻璃模糊 */
        .main-card { 
            background: rgba(0, 0, 0, 0.45) !important; 
            padding: 40px; border-radius: 24px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5) !important; 
            display: inline-block; width: 820px; max-width: 95%; 
            backdrop-filter: blur(10px) !important; 
            -webkit-backdrop-filter: blur(10px) !important;
            border: 1px solid rgba(255, 182, 193, 0.3) !important; 
            position: relative; 
            text-align: center; /* 确保内部元素居中 */
        }
        
        /* 2. 顶部的提示框 */
        .hint-box { 
            background-color: rgba(0, 0, 0, 0.3) !important; 
            color: #ffffff; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); 
            padding: 15px 20px; border-left: 5px solid #ff69b4 !important; 
            border-radius: 8px; margin-bottom: 30px; font-size: 14px; text-align: center; line-height: 1.8; 
            border: 1px solid rgba(255, 182, 193, 0.2) !important; 
        }
        /* ✅ 强力中心：利用 Gap 属性实现绝对对称 */
h2 {
    display: flex !important;
    justify-content: center !important; /* 水平绝对居中 */
    align-items: center !important;    /* 垂直对齐 */
    gap: 20px !important;              /* 🌹文字🌹 之间的固定间距 */
    width: 100% !important;
    margin: 0 auto 30px auto !important;
    padding: 0 !important;
    
    /* 保持霸气霓虹效果 */
    font-size: 44px !important; 
    font-weight: 900; 
    white-space: nowrap !important;
    color: #ffffff; 
    /* 修正：letter-spacing 调小一点，防止右侧溢出 */
    letter-spacing: 1px !important; 
    text-shadow: 
        0 0 3px #ffffff,
        4px 4px 0px #c2185b,
        0 0 15px #ff69b4,
        0 0 35px #ff69b4,
        5px 5px 15px rgba(0,0,0,0.9);
}

/* 🌹 玫瑰花伪元素：移除所有手动 margin，交给 gap 处理 */
h2::before, h2::after {
    content: "🌹" !important;
    font-size: 38px !important;
    margin: 0 !important; /* 彻底清除手动间距 */
    flex-shrink: 0 !important; /* 防止花被挤扁 */
}

        
        .email-card { 
            font-size: 34px; font-weight: bold; color: #ffffff; 
            text-shadow: 0 0 5px #ffffff, 0 0 10px #ff69b4, 0 0 20px #ff69b4, 0 0 40px #d81b60;
            margin: 20px 0; padding: 25px; 
            background: rgba(0, 0, 0, 0.3) !important; 
            border-radius: 16px; 
            border: 2px dashed rgba(255, 105, 180, 0.6) !important; 
            word-break: break-all; text-align: center; 
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.2) !important; 
        }
        
        button { font-size: 15px; padding: 12px 24px; cursor: pointer; border: none; border-radius: 12px; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 6px; position: relative; transition: all 0.1s; user-select: none; }
        .btn-custom { background: var(--purple-main); box-shadow: 0 5px 0 var(--purple-dark); }
        .btn-gen { background: var(--rose-main); box-shadow: 0 5px 0 var(--rose-dark); }
        .btn-refresh-inbox { background: var(--green-main); box-shadow: 0 4px 0 var(--green-dark); padding: 8px 18px; font-size: 14px; }
        button:active { transform: translateY(4px) !important; box-shadow: 0 1px 0 rgba(0,0,0,0.2) !important; }
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; }
        
        input[type="text"] { padding: 12px 15px; font-size: 16px; border: 2px solid rgba(255, 182, 193, 0.5); border-radius: 12px; outline: none; width: 200px; text-align: center; background: rgba(0, 0, 0, 0.5); color: white; }
        
        .inbox-card { margin-top: 40px; text-align: left; background: rgba(0, 0, 0, 0.3) !important; padding: 25px; border-radius: 18px; border: 1px solid rgba(255, 182, 193, 0.2) !important; min-height: 300px; }
        .inbox-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 182, 193, 0.3); padding-bottom: 15px; margin-bottom: 20px; }
        .inbox-title { margin: 0; color: #ff69b4; font-size: 22px; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        .refresh-timer { font-size: 13px; color: #fff; font-weight: normal; margin-left: 5px; background: rgba(0, 0, 0, 0.6); padding: 2px 8px; border-radius: 20px; border: 1px solid rgba(255, 182, 193, 0.5); }

        #customToast { visibility: hidden; min-width: 200px; background-color: rgba(0, 0, 0, 0.85); color: #fff; text-align: center; border-radius: 12px; padding: 18px 30px; position: fixed; z-index: 1000; left: 50%; top: 50%; transform: translate(-50%, -50%); font-size: 16px; font-weight: bold; backdrop-filter: blur(8px); }
        #customToast.show { visibility: visible; animation: fadeInOut 2.5s; }
        @keyframes fadeInOut { 0% {opacity: 0;} 15% {opacity: 1;} 85% {opacity: 1;} 100% {opacity: 0;} }

        @media (max-width: 600px) {
            .email-card { font-size: 22px !important; }
            h2 { font-size: 4.8vw !important; letter-spacing: 0px !important; white-space: nowrap !important; }
            .inbox-header { flex-wrap: wrap !important; gap: 12px !important; }
        }
    </style>
</head>
<body>

<div id="customToast">✅ 已开启全能提醒</div>

<div class="main-card">
    
    <div class="hint-box">
        <p style="margin: 0; letter-spacing: 1px;">
            🌹 筑梦独家：在下方输入前缀并点击 “自定义邮箱” 即可重启曾使用过的邮箱进行邮件的接收！
        </p>
    </div>

    <h2>LG筑梦电子 📧 无限临时邮箱系统</h2>

    <div class="email-card" id="emailText">正在呼唤筑梦电子</div>

    <div class="btn-group">
        <input type="text" id="customInput" placeholder="输入邮箱前缀 (如:LG)">
        <button class="btn-custom" onclick="setCustom()">🌹 自定义邮箱</button>
        <button class="btn-gen" onclick="generateRandom()">🔄 随机生成</button>
    </div>

    <div style="display: flex !important; flex-direction: row !important; gap: 10px !important; margin-top: 15px !important; width: 100% !important;">
        <button onclick="copyEmail()" style="flex: 1; height: 45px; background-color: #e91e63;">📋 复制地址</button>
        <button onclick="window.location.href='index.html'" style="flex: 1; height: 45px; background-color: #f06292;">🏠 返回主页</button>
    </div>
   
   <div class="inbox-card">
        
        <div class="inbox-header" style="display: flex; align-items: center; justify-content: space-between; gap: 15px; width: 100%; padding: 0 5px; box-sizing: border-box; border-bottom: 1px solid rgba(255, 182, 193, 0.3); padding-bottom: 15px; margin-bottom: 20px;">
            
            <div style="display: flex; align-items: center; gap: 10px; flex-shrink: 0;">
                <h3 class="inbox-title" style="margin: 0;">📥 筑梦收件箱</h3>
                <span class="refresh-timer" id="timerDisplay">5s 刷新</span>
            </div>

            <div style="flex: 1; text-align: center; color: #fff; font-size: 14px; letter-spacing: 1px; font-weight: normal; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                💡 如您没有激活码请返回主页到底部联系站长微信进行获取！
            </div>

            <div style="flex-shrink: 0;">
                <button class="btn-refresh-inbox" onclick="manualRefresh()" style="margin: 0; padding: 8px 16px;">🔄 手动刷新</button>
            </div>
        </div>

        <div id="emailList">
            <p style="text-align:center; color:#999; padding-top:80px;">正在连接筑梦电子...</p>
        </div>

    </div> 
</div> <script>
    const API_BASE = "https://guo.roselg.xyz/api/emails";
    const DOMAIN = "@roselg.xyz";
    let currentEmail = "";
    let timeLeft = 5; 
    let lastEmailCount = -1;
    let rollInterval;

    function showToast(msg) {
        const toast = document.getElementById("customToast");
        toast.innerText = msg;
        toast.className = "show";
        setTimeout(() => { toast.className = ""; }, 2500);
    }

    function generateRandom() {
        const rand = Math.random().toString(36).substring(2, 10);
        updateDisplay(rand + DOMAIN, true);
    }

    function setCustom() {
        const val = document.getElementById('customInput').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
        if(!val) return showToast("⚠️ 请输入前缀");
        updateDisplay(val + DOMAIN, false);
    }

    function updateDisplay(email, isRandom = false) {
        const textElement = document.getElementById('emailText');
        clearInterval(rollInterval); 
        if (isRandom) {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let iterations = 0;
            rollInterval = setInterval(() => {
                let randomPrefix = '';
                for (let i = 0; i < 8; i++) randomPrefix += chars[Math.floor(Math.random() * chars.length)];
                textElement.innerText = randomPrefix + DOMAIN;
                if (++iterations >= 15) {
                    clearInterval(rollInterval);
                    finalizeUpdate(email);
                }
            }, 40);
        } else {
            finalizeUpdate(email);
        }
    }

    function finalizeUpdate(email) {
        currentEmail = email;
        document.getElementById('emailText').innerText = currentEmail;
        lastEmailCount = -1; 
        timeLeft = 5; 
        fetchEmails();
    }

    function copyEmail() {
        if(!currentEmail) return;
        navigator.clipboard.writeText(currentEmail).then(() => showToast("📋 邮箱地址已复制"));
    }

    function startCountdown() {
        setInterval(() => {
            if (--timeLeft < 0) {
                fetchEmails();
                timeLeft = 5;
            }
            document.getElementById('timerDisplay').innerText = `${timeLeft}s 刷新`;
        }, 1000);
    }

    function manualRefresh() {
        fetchEmails();
        timeLeft = 5; 
        showToast("🔄 正在刷新邮件");
    }

   async function fetchEmails() {

    if (!currentEmail) return;



    const code = localStorage.getItem('authCode');

    const devId = localStorage.getItem('deviceId');



    if (!code) {

        renderLockedInbox(); 

        return;

    }



    try {

        const response = await fetch(`${API_BASE}?address=${currentEmail}&code=${code}&deviceId=${devId}`);

        

        if (response.status === 401 || response.status === 403) {

            const errData = await response.json();

            localStorage.removeItem('authCode');

            renderLockedInbox(errData.message || "激活码无效，请重新输入");

            return;

        }



        const data = await response.json();



        // 🔊 语音 + 🚀 弹窗逻辑

        if (data.length > lastEmailCount && lastEmailCount !== -1) {

            // 调用浏览器语音

            const msg = new SpeechSynthesisUtterance();

            msg.text = "主人，您有新的邮件，请注意查收";

            msg.lang = "zh-CN";

            window.speechSynthesis.speak(msg);



            // 触发系统弹窗

            if (Notification.permission === "granted") {

                const newMail = data[0];

                new Notification("📬 筑梦收件箱新邮件！", {

                    body: `发件人: ${newMail.from}\n主题: ${newMail.subject}`,

                    icon: "https://roselg.xyz/favicon.ico" 

                });

            }

        }
        
        lastEmailCount = data.length;
        
        // ✅ 运行画图函数
        if (typeof renderEmails === 'function') {
            renderEmails(data);
        }

    } catch (e) {
        console.error("手机连接异常:", e);
        const list = document.getElementById('emailList');
        if (list) list.innerHTML = `<p style="text-align:center; color:#ff6b81; padding-top:40px;">💡 筑梦系统正在全力连接中...</p>`;
    }
}

    function renderEmails(emails) {
        const container = document.getElementById('emailList');
        if (!emails || emails.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#999; padding-top:80px;">暂无新邮件，筑梦系统将实时获取最新邮件！</p>';
            return;
        }
        container.innerHTML = emails.map(mail => `
            <div style="background: rgba(30, 30, 35, 0.95); border-radius: 15px; padding: 20px; margin-bottom: 20px; border-left: 5px solid #ff6b81; text-align: left; color:#fff;">
                <div style="font-size: 13px; color: #ffb8c6;">来自：${mail.from}</div>
                <div style="font-size: 18px; font-weight: bold; margin: 10px 0;">主题：${mail.subject}</div>
                <div style="background: #fff; color: #333; padding: 15px; border-radius: 10px;">${mail.html || mail.text}</div>
            </div>
        `).join('');
    }

    function renderLockedInbox(msg = "激活后即可查看实时邮件") {
        document.getElementById('emailList').innerHTML = `
            <div style="padding: 40px; text-align: center; border: 2px dashed #ff69b4; border-radius: 15px; background: rgba(0,0,0,0.2);">
                <h3 style="color: #fff;">🔒 ${msg}</h3>
                <input type="password" id="authInput" placeholder="输入激活码..." style="padding: 10px; border-radius: 5px;">
                <button onclick="unlock()" style="background:#ff69b4; padding: 10px 20px; margin-top:10px;">立即激活</button>
            </div>`;
    }

    async function unlock() {
        const code = document.getElementById('authInput').value.trim();
        if(!code) return showToast("⚠️ 请输入激活码");
        localStorage.setItem('authCode', code);
        location.reload();
    }

    // 初始化
    if (!localStorage.getItem('deviceId')) localStorage.setItem('deviceId', 'dev_' + Math.random().toString(36).substring(2, 10));
    Notification.requestPermission();
    generateRandom();
    startCountdown();
</script>
</body>
</html>
