        /* 弹窗遮罩：极暗底色，解决安卓滑动 Bug 的第一道防线 */
        .email-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.88); /* 极暗遮罩，只透出微弱背景 */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 99999;
            display: none; /* 默认隐藏 */
            justify-content: center;
            align-items: center;
            overscroll-behavior: none; /* 阻止滑动穿透 */
        }

        /* 弹窗核心框 */
        .email-modal-box {
            background: rgba(15, 15, 20, 0.95);
            border: 2px solid rgba(255, 105, 180, 0.6);
            border-radius: 20px;
            width: 92%;
            max-width: 650px;
            max-height: 85vh; /* 保证框不会超出屏幕 */
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(255, 105, 180, 0.3);
            animation: modalPop 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); /* Q弹动画 */
        }

        @keyframes modalPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-header-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px 20px 0 0;
        }

        .modal-close-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 6px 14px; border-radius: 8px;

        .modal-close-btn:hover { background: #ff69b4; border-color: #ff69b4; }

        /* 内部滚动区域（只有这里能滑） */

        }

    color: #0f0; text-shadow: 0 0 10px rgba(0,255,0,0.5); /* 绿色荧光感 */
    letter-spacing: 2px; margin-bottom: 15px;
    cursor: pointer; background: rgba(0, 255, 0, 0.1);
    border: 1px dashed #0f0; padding: 10px; border-radius: 12px;
}
.mail-modal-vcode:active { transform: scale(0.95); } /* 点击回弹效果 */
.mail-modal-content {
    flex: 1; overflow-y: auto;
    background: #fff; color: #222;
    padding: 12px; border-radius: 12px; font-size: 14px;
    border: 4px solid rgba(0,0,0,0.2);
}
        /* =======================================
            🚀 手机端沉浸式详情框（全设备自适应）
           ======================================= */
        .email-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); /* 足够暗，突出内容 */
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 99999; display: none; justify-content: center; align-items: center;
        }

        .email-modal-box {
            background: rgba(15, 15, 20, 0.98);
            border: 1px solid rgba(255, 105, 180, 0.5);
            border-radius: 24px; width: 92%; max-width: 600px;
            max-height: 85vh; display: flex; flex-direction: column;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8);
        }

        /* 锁死底层滑动的大招 */
        .no-scroll { overflow: hidden !important; height: 100vh !important; }

        /* 验证码高亮（正文内点击） */
        .magic-vcode-click {
            color: #00f2ff !important;
            font-weight: 900 !important;
            text-decoration: underline dashed #00f2ff !important;
            cursor: pointer;
            padding: 0 4px;
        }
  </style>
</head>
<body>

<div id="customToast">✅ 已开启全能提醒</div>

<div class="main-card">
    <div class="hint-box">
        <p style="margin: 0; letter-spacing: 1px;">
            🌹 筑梦独家：在下方输入前缀并点击 “自定义邮箱” 即可重启曾使用过的邮箱进行邮件的接收！
        </p>
    </div>

    <h2>LG筑梦电子 📧 无限临时邮箱系统</h2>

    <div class="layout-row" style="display: flex; align-items: stretch; gap: 15px; margin-bottom: 15px;">
        <div class="email-card" id="emailText" style="flex: 1; margin: 0; display: flex; align-items: center; justify-content: center; padding: 10px;">正在呼唤筑梦电子</div>
        <button class="btn-gen" onclick="generateRandom()" style="margin: 0; width: 115px !important; flex: none !important; white-space: nowrap !important; padding: 0 5px !important; display: flex; align-items: center; justify-content: center;">🔄 随机生成</button>
    </div>

    <div class="action-row-main" style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px;">
        <a href="admin/index.html" class="btn-clone admin-theme">⚙️ 站长/代理商管理系统</a>
        <input type="text" id="customInput" placeholder="请输入邮箱前缀">
        <button onclick="setCustomEmail()" class="btn-clone custom-theme">🛠️ 自定义邮箱</button>
    </div>
   
    <div style="display: flex !important; flex-direction: row !important; gap: 10px !important; margin-top: 15px !important; width: 100% !important;">
    <button onclick="copyEmail()" class="btn-footer-action" style="flex: 1; height: 45px; background-color: #e91e63; box-shadow: 0 5px 0 #c2185b;">📋 复制地址</button>
    <button onclick="clearEmails()" class="btn-footer-action" style="flex: 1; height: 45px; background-color: #d81b60; box-shadow: 0 5px 0 #ad1457;">🗑️ 清空邮件</button>
    <button onclick="window.location.href='index.html'" class="btn-footer-action" style="flex: 1; height: 45px; background-color: #f06292; box-shadow: 0 5px 0 #c2185b;">🏠 返回主页</button>
</div>
   
    <div class="inbox-card">
        <div class="inbox-header inbox-header-container" style="display: flex; align-items: center; justify-content: space-between; gap: 15px; width: 100%; padding: 0 5px; box-sizing: border-box; border-bottom: 1px solid rgba(255, 182, 193, 0.3); padding-bottom: 15px; margin-bottom: 20px;">
            <div style="display: flex; align-items: center; gap: 10px; flex-shrink: 0;">
                <h3 class="inbox-title" style="margin: 0;">📥 筑梦收件箱</h3>
                <span class="refresh-timer" id="timerDisplay">5s 刷新</span>
            </div>
            <div class="mobile-hint-text" style="color: #ffffff !important; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);">
                💡 如您没有激活码请返回主页到底部联系站长微信获取
            </div>
            <div style="flex-shrink: 0;">
                <button class="btn-refresh-inbox" onclick="manualRefresh()" style="margin: 0; padding: 8px 16px;">🔄 手动刷新</button>
            </div>
        </div>

        <div id="emailList">
            <p style="text-align:center; color:#999; padding-top:80px;">正在连接筑梦电子...</p>
        </div>
    </div> 

<script>
    const API_BASE = "https://guo.roselg.xyz/api/emails";
    const DOMAIN = "@roselg.xyz";
    let currentEmail = "";
    let timeLeft = 5; 
    let lastEmailCount = -1;
    let rollInterval;
    let fullServerEmails = []; 

    function showToast(msg) {
        const toast = document.getElementById("customToast");
        toast.innerText = msg;
        toast.className = "show";
        setTimeout(() => { toast.className = ""; }, 2500);
    }

    function generateRandom() {
        const rand = Math.random().toString(36).substring(2, 10);
        updateDisplay(rand + DOMAIN, true);
    }

  function setCustomEmail() {
    const inputEl = document.getElementById('customInput');
    let val = inputEl.value.trim(); // 仅去除首尾空格
    
    if(!val) {
        showToast("⚠️ 请先输入邮箱前缀");
        return;
    }

    // 🚀 核心校验正则：
    const validRegex = /^[a-zA-Z0-9._+-]+$/;

    if (!validRegex.test(val)) {
        showToast("❌ 不合法邮箱前缀（仅限字母、数字及 . _ - +）");
        return; 
    }

    if (val.startsWith('.') || val.endsWith('.')) {
        showToast("❌ 点号不能放在邮箱开头或结尾");
        return;
    }

    updateDisplay(val + DOMAIN, false);
    showToast("✅ 自定义邮箱已激活");
}
    function updateDisplay(email, isRandom = false) {
        const textElement = document.getElementById('emailText');
        clearInterval(rollInterval); 
        if (isRandom) {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789@.';
            let iterations = 0;
            const targetLength = email.length;
            rollInterval = setInterval(() => {
                let randomStr = '';
                for (let i = 0; i < targetLength; i++) randomStr += chars[Math.floor(Math.random() * chars.length)];
                textElement.innerText = randomStr; 
                if (++iterations >= 15) {
                    clearInterval(rollInterval);
                    finalizeUpdate(email);
                    showToast("✅ 随机邮箱已激活");
                }
            }, 40);
        } else {
            finalizeUpdate(email);
        }
    }

    function finalizeUpdate(email) {
        currentEmail = email;
        document.getElementById('emailText').innerText = currentEmail;
        lastEmailCount = -1; 
        timeLeft = 5; 
        fetchEmails();
    }

    function copyEmail() {
        if(!currentEmail) return;
        window.copyToClipboard(currentEmail, "📋 邮箱地址已复制");
    }

    function clearEmails() {
        if (!fullServerEmails || fullServerEmails.length === 0) return showToast("📭 当前没有邮件可清理");
        const maxTimestamp = Math.max(...fullServerEmails.map(m => m.timestamp || 0));
        const cutoffTime = maxTimestamp > 0 ? maxTimestamp : Date.now();
        localStorage.setItem('clearTime_' + currentEmail, cutoffTime);
        renderEmails([]); 
        showToast("🗑️ 邮箱已清理，等待新邮件...");
    }

    function startCountdown() {
        setInterval(() => {
            if (--timeLeft < 0) {
                fetchEmails();
                timeLeft = 5;
            }
            document.getElementById('timerDisplay').innerText = `${timeLeft}s 刷新`;
        }, 1000);
    }

    function manualRefresh() {
        fetchEmails();
        timeLeft = 5; 
        showToast("🔄 正在刷新邮件");
    }

    async function fetchEmails() {
        if (!currentEmail) return;
        const code = localStorage.getItem('authCode');
        let devId = localStorage.getItem('deviceId');
        if (!devId || devId === "null" || devId === "undefined") {
            devId = 'dev_' + Math.random().toString(36).substring(2, 10);
            localStorage.setItem('deviceId', devId);
        }
        if (!code) {
            if (!document.getElementById('authInput')) renderLockedInbox();
            return;
        }

        try {
            const response = await fetch(`${API_BASE}?address=${currentEmail}&code=${code}&deviceId=${devId}`);
            if (response.status === 401 || response.status === 403) {
                localStorage.removeItem('authCode');
                renderLockedInbox("❌ 激活码无效，请重新输入！");
                return;
            }
            const data = await response.json();
            fullServerEmails = data;

            let cutoffTime = parseInt(localStorage.getItem('clearTime_' + currentEmail) || '0');
            const visibleEmails = data.filter(mail => {
                if (mail.timestamp) return mail.timestamp > cutoffTime;
                return true; 
            });

            // 🎯 修复：先渲染数据，确保 window.currentVisibleEmails 被赋值
            if (typeof renderEmails === 'function') {
                renderEmails(visibleEmails);
            }

            // 🎯 然后再执行语音播报和自动弹窗逻辑
            if (visibleEmails.length > lastEmailCount && lastEmailCount !== -1) {
                try {
                    if (typeof window.SpeechSynthesisUtterance !== 'undefined' && window.speechSynthesis) {
                        const msg = new SpeechSynthesisUtterance("您有新的邮件,请注意查收！");
                        msg.lang = "zh-CN";
                        window.speechSynthesis.speak(msg);
                    }
                } catch (speechError) { console.log("语音播报不可用"); }

                if (window.Notification && Notification.permission === "granted") {
                    const newMail = visibleEmails[0];
                    if(newMail) {
                        new Notification("📬 筑梦收件箱新邮件！", {
                            body: `发件人: ${newMail.from}\n主题: ${newMail.subject}`,
                            icon: "https://roselg.xyz/favicon.ico"
                        });
                    }
                }

                // 如果是手机端，收到新邮件直接弹窗显示
                if (window.innerWidth <= 650) {
                    openEmailModal(0, "刚刚"); 
                }
            }
            lastEmailCount = visibleEmails.length;
          
        } catch (e) {
            document.getElementById('emailList').innerHTML = '<p style="color:red; text-align:center; padding-top:50px;">系统繁忙: ' + String(e) + '</p>';
        }
    }

    function getSmartVCode(html, text) {
        const cleanText = (html || text || "").replace(/<[^>]*>/g, ' ');
        const commonGarbage = ['2024','2025','2026','DESIGN','LIMITLESS','CREATIVITY','SUPPORT'];
        const candidates = cleanText.match(/\b[A-Z0-9]{4,8}\b/g) || [];
        const filtered = candidates.filter(c => !commonGarbage.includes(c.toUpperCase()));
        if (filtered.length === 0) return null;
        return filtered.sort((a, b) => {
            const aHasAlpha = /[A-Z]/.test(a), aHasNum = /\d/.test(a);
            const bHasAlpha = /[A-Z]/.test(b), bHasNum = /\d/.test(b);
            if ((aHasAlpha && aHasNum) && !(bHasAlpha && bHasNum)) return -1;
            if (!(aHasAlpha && aHasNum) && (bHasAlpha && bHasNum)) return 1;
            if (a.length === 6 && b.length !== 6) return -1;
            if (a.length !== 6 && b.length === 6) return 1;
            return 0;
        })[0];
    }

function renderEmails(emails) {
        // 🎯 修复：使用解构翻转，确保索引绝对匹配最新邮件
        window.currentVisibleEmails = [...emails].reverse(); 
        const container = document.getElementById('emailList');
        if (!emails || emails.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#999; padding-top:80px;">暂无新邮件，筑梦系统将实时获取最新邮件！</p>';
            return;
        }

        container.innerHTML = window.currentVisibleEmails.map((mail, index) => {
            let timeString = "时间未知";
            if(mail.timestamp) {
                const d = new Date(mail.timestamp);
                timeString = `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`;
            }
            const vCode = getSmartVCode(mail.html, mail.text);
            
            return `
            <div class="mail-item-box" onclick="openEmailModal(${index}, '${timeString}')" style="cursor: pointer;">
                ${vCode ? `
                <button onclick="copyToClipboard('${vCode}', '✅ 验证码 ${vCode} 已复制'); event.stopPropagation();" class="vcode-btn-admin-clone">
                    ⚡ 一键复制验证码
                </button>
                ` : ''}
                <div class="mail-meta-group">
                    <div class="meta-item">👤 发件：${mail.from}</div>
                    <div class="meta-item">📅 时间：${timeString}</div>
                    <div class="subject-item">📑 主题：${mail.subject}</div>
                </div>                
                <div class="mail-content-hd">
                    ${mail.html || mail.text}
                </div>
            </div>`;
        }).join('');
    }

    window.copyToClipboard = function(text, msg) {
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(() => { showToast(msg); }).catch(() => { fallbackCopy(text, msg); });
        } else { fallbackCopy(text, msg); }
    };

    function fallbackCopy(text, msg) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed"; textArea.style.top = "-9999px";
        document.body.appendChild(textArea);
        if (navigator.userAgent.match(/ipad|iphone|mac/i)) {
            const range = document.createRange();
            range.selectNodeContents(textArea);
            const selection = window.getSelection();
            selection.removeAllRanges(); selection.addRange(range);
            textArea.setSelectionRange(0, 999999);
        } else { textArea.select(); }
        try { if(document.execCommand('copy')) showToast(msg); } catch (err) {}
        document.body.removeChild(textArea);
    }
    
    function renderLockedInbox(msg = "激活后即可查看实时邮件") {
        const container = document.getElementById('emailList');
        if (!container) return;
        container.innerHTML = `
            <div style="padding: 40px 20px; text-align: center; border: 2px dashed #ff69b4; border-radius: 15px; margin: 20px; background: transparent;">
                <div style="font-size: 40px; margin-bottom: 15px;">🔒</div>
                <h3 style="color: #fff; margin-bottom: 20px;">${msg}</h3>
                <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; align-items: center;">
                    <input type="password" id="authInput" placeholder="输入激活码..." style="padding: 12px; border-radius: 8px; border: 1px solid #ff69b4; background: rgba(255,255,255,0.1); color: #fff; width: 200px; outline: none;">
                    <button onclick="unlock()" class="btn-unlock-logic" style="padding: 12px 25px; border-radius: 8px; background: #ff69b4; color: #fff; border: none; cursor: pointer; font-weight: bold; box-shadow: 0 5px 0 #c2185b; white-space: nowrap;">立即激活</button>
                </div>
            </div>`;
    }

    async function unlock() {
        const codeInput = document.getElementById('authInput');
        const code = codeInput.value.trim();
        if (!code) return showToast("⚠️ 请输入激活码");
        const devId = localStorage.getItem('deviceId');
        try {
            const response = await fetch(`${API_BASE.replace('emails', 'verify')}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code, deviceId: devId })
            });
            const data = await response.json();
            if (response.ok) {
                localStorage.setItem('authCode', code);
                showToast("✅ 激活成功");
                setTimeout(() => { location.reload(); }, 800);
            } else { showToast("❌ " + (data.error || "激活码无效！")); }
        } catch (error) { showToast("🌐 网络错误"); }
    }

    if (!localStorage.getItem('deviceId')) localStorage.setItem('deviceId', 'dev_' + Math.random().toString(36).substring(2, 10));
    if (window.Notification) Notification.requestPermission();
    
    document.getElementById('customInput').addEventListener('input', function(e) {
        const originalVal = this.value;
        const newVal = originalVal.replace(/[^a-zA-Z0-9!#$%&'*+\-\/=?^_`{|}~.]/g, '');
        if (originalVal !== newVal) { this.value = newVal; showToast("⚠️ 只能输入合法的邮箱前缀哦！"); }
    });

    generateRandom();
    startCountdown();

    window.openEmailModal = function(index, timeString) {
        const mail = window.currentVisibleEmails[index];
        if(!mail) return;
        const vCode = getSmartVCode(mail.html, mail.text);
        let content = mail.html || mail.text;
        if (vCode) {
            const regex = new RegExp(vCode, 'g');
            content = content.replace(regex, `<span class="magic-vcode-click" onclick="copyToClipboard('${vCode}', '✅ 验证码 ${vCode} 已复制'); event.stopPropagation();">${vCode}</span>`);
        }
        document.getElementById('modalEmailContent').innerHTML = `
            <div style="background: rgba(0,242,255,0.08); border: 1px dashed rgba(0,242,255,0.4); padding: 12px; border-radius: 12px; color: #00f2ff; font-size: 13px; text-align: center; margin-bottom: 20px; font-weight: bold;">
                💡 提示：点击正文中的验证码即可直接复制
            </div>
            <div class="mail-meta-group" style="margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;">
                <div class="meta-item" style="opacity: 0.8; margin-bottom: 5px;">👤 发件：${mail.from}</div>
                <div class="meta-item" style="opacity: 0.8; margin-bottom: 5px;">📅 时间：${timeString}</div>
                <div class="subject-item" style="font-size: 18px; color: #fff; margin-top: 8px !important; font-weight: bold;">📑 主题：${mail.subject}</div>
            </div>
            <div class="mail-content-hd" style="border:none; padding:0; background:transparent !important; color:#eee !important; font-size: 15px; line-height: 1.6;">
                ${content}
            </div>`;
        document.getElementById('emailDetailModal').style.display = 'flex';
        document.body.classList.add('no-scroll');
    };

    window.closeEmailModal = function() {
        document.getElementById('emailDetailModal').style.display = 'none';
        document.body.classList.remove('no-scroll'); 
    };
</script>

<div id="emailDetailModal" class="email-modal-overlay">
    <div class="email-modal-box">
        <div class="modal-header-row">
            <span style="color: #ff69b4; font-weight: bold;">📬 邮件详情</span>
            <button class="modal-close-btn" onclick="closeEmailModal()">✖ 关闭</button>
        </div>
        <div id="modalEmailContent"></div>
    </div>
</div>
</body>
</html>
