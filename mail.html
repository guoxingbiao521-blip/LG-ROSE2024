<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌹 LG筑梦电子无限临时邮箱系统 🌹</title>
 <style>
        :root { 
            --rose-main: #ff69b4; --rose-dark: #d81b60; --rose-bg: transparent; --rose-border: #ffb6c1; 
            --blue-main: #0078D7; --blue-dark: #005a9e; --green-main: #4caf50; --green-dark: #388e3c;
            --purple-main: #da70d6; --purple-dark: #b359b0;
        }

        /* --- 绝对属于你的玫瑰背景 --- */
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: url('./bg.JPG') no-repeat center center fixed !important;
            background-size: cover !important;
        }
        
        .main-container, .wrapper, #app { background-color: transparent !important; }
        
        /* 1. 最外层的大框：深色黑透 + 10px毛玻璃模糊 */
        .main-card { 
            background: rgba(0, 0, 0, 0.45) !important; /* 加了45%透明度的黑底 */
            padding: 40px; border-radius: 24px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5) !important; /* 给整个框加点立体阴影 */
            display: inline-block; width: 820px; max-width: 95%; 
            backdrop-filter: blur(10px) !important; /* 核心：磨砂模糊 */
            -webkit-backdrop-filter: blur(10px) !important;
            border: 1px solid rgba(255, 182, 193, 0.3) !important; /* 保留细微的粉色边框 */
            position: relative; 
        }
        
        /* 2. 顶部的提示框 */
        .hint-box { 
            background-color: rgba(0, 0, 0, 0.3) !important; 
            color: #ffffff; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); 
            padding: 15px 20px; border-left: 5px solid #ff69b4 !important; 
            border-radius: 8px; margin-bottom: 30px; font-size: 14px; text-align: left; line-height: 1.8; 
            border: 1px solid rgba(255, 182, 193, 0.2) !important; 
        }
        
  /* ✅ 标题终极排版：撑满空隙的霸气 3D 霓虹字 */
        h2 {
            display: flex !important;
            justify-content: space-between !important; 
            align-items: center !important;
            width: 100% !important;
            margin-top: 0;
            margin-bottom: 30px;
            
            /* 👇 核心修改在这里：字号更霸气，字间距拉大把空隙吃掉！ */
            font-size: 44px !important; 
            letter-spacing: 4px !important; 
            
            font-weight: 900; 
            white-space: nowrap !important;
            color: #ffffff; 
            text-shadow: 
                0 0 3px #ffffff,
                4px 4px 0px #c2185b,
                0 0 15px #ff69b4,
                0 0 35px #ff69b4,
                5px 5px 15px rgba(0,0,0,0.9);
        }
        
        /* 单独控制玫瑰的大小，别让花比字还大 */
        h2::before { content: "🌹"; font-size: 38px; }
        h2::after { content: "🌹"; font-size: 38px; }
        
       /* 3. 显示邮箱地址的粉色框：深色黑透 + 霓虹发光字 */
        .email-card { 
            font-size: 34px; /* 稍微放大一点点，发光更好看 */
            font-weight: bold; 
            color: #ffffff; 
            /* 👇 核心发光魔法：多层光晕叠加 */
            text-shadow: 
                0 0 5px #ffffff, 
                0 0 10px #ff69b4, 
                0 0 20px #ff69b4, 
                0 0 40px #d81b60,
                0 0 80px #d81b60;
            margin: 20px 0; 
            padding: 25px; 
            background: rgba(0, 0, 0, 0.3) !important; 
            border-radius: 16px; 
            /* 让虚线边框也跟着有一点点发光感 */
            border: 2px dashed rgba(255, 105, 180, 0.6) !important; 
            word-break: break-all; 
            text-align: center; 
            /* 给整个框框的边缘也加一圈淡淡的粉色光晕 */
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.2) !important; 
        }
        
        button { font-size: 15px; padding: 12px 24px; cursor: pointer; border: none; border-radius: 12px; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 6px; position: relative; transition: all 0.1s; user-select: none; }
        .btn-custom { background: var(--purple-main); box-shadow: 0 5px 0 var(--purple-dark); }
        .btn-gen { background: var(--rose-main); box-shadow: 0 5px 0 var(--rose-dark); }
        .btn-refresh-inbox { background: var(--green-main); box-shadow: 0 4px 0 var(--green-dark); padding: 8px 18px; font-size: 14px; }
        .btn-audio-test { background: #607d8b; box-shadow: 0 4px 0 #455a64; padding: 10px 20px; font-size: 15px; margin: 0 auto 20px auto; }
        button:active { transform: translateY(4px) !important; box-shadow: 0 1px 0 rgba(0,0,0,0.2) !important; }
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; }
        
        input[type="text"] { padding: 12px 15px; font-size: 16px; border: 2px solid rgba(255, 182, 193, 0.5); border-radius: 12px; outline: none; width: 200px; text-align: center; background: rgba(0, 0, 0, 0.5); color: white; }
        input[type="text"]::placeholder { color: #aaaaaa; }
        
        /* 4. 底部的收件箱 */
        .inbox-card { margin-top: 40px; text-align: left; background: rgba(0, 0, 0, 0.3) !important; padding: 25px; border-radius: 18px; border: 1px solid rgba(255, 182, 193, 0.2) !important; min-height: 300px; }
        .inbox-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 182, 193, 0.3); padding-bottom: 15px; margin-bottom: 20px; }
        .inbox-title { margin: 0; color: #ff69b4; font-size: 22px; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        
        .status-tag { font-size: 11px; color: #fff; background: rgba(0, 0, 0, 0.6); padding: 3px 8px; border-radius: 10px; font-weight: normal; margin-left: 5px; border: 1px solid #555; }
        .refresh-timer { font-size: 13px; color: #fff; font-weight: normal; margin-left: 5px; background: rgba(0, 0, 0, 0.6); padding: 2px 8px; border-radius: 20px; border: 1px solid rgba(255, 182, 193, 0.5); }

        #customToast { visibility: hidden; min-width: 200px; background-color: rgba(0, 0, 0, 0.85); color: #fff; text-align: center; border-radius: 12px; padding: 18px 30px; position: fixed; z-index: 1000; left: 50%; top: 50%; transform: translate(-50%, -50%); font-size: 16px; font-weight: bold; backdrop-filter: blur(8px); box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
        #customToast.show { visibility: visible; animation: fadeInOut 2.5s; }
        @keyframes fadeInOut { 0% {opacity: 0; transform: translate(-50%, -40%);} 15% {opacity: 1; transform: translate(-50%, -50%);} 85% {opacity: 1; transform: translate(-50%, -50%);} 100% {opacity: 0; transform: translate(-50%, -60%);} }
     #customToast.show { visibility: visible; animation: fadeInOut 2.5s; }
    @keyframes fadeInOut { 0% {opacity: 0; transform: translate(-50%, -40%);} 15% {opacity: 1; transform: translate(-50%, -50%);} 85% {opacity: 1; transform: translate(-50%, -50%);} 100% {opacity: 0; transform: translate(-50%, -60%);} }
    
    /* 📱 手机端专属适配方案（解决换行和拥挤问题） */
    @media (max-width: 600px) {
        /* 1. 缩小邮箱发光大字的尺寸，保证一行显示 */
        .email-card { font-size: 22px !important; padding: 15px 10px !important; }
        
       /* 2. 手机端标题防换行终极方案 */
        h2 { 
            font-size: 4.8vw !important; /* 👈 黑科技：根据手机屏幕宽度自动变大变小 */
            letter-spacing: 0px !important; /* 手机上取消字间距，挤出空间 */
            white-space: nowrap !important; /* 👈 死命令：无论如何绝对不允许换行！ */
            margin-bottom: 20px !important;
        }

        /* 3. 收件箱头部：允许自动换行，增加间距，防止按钮和标签打架 */
        .inbox-header { flex-wrap: wrap !important; gap: 12px !important; }
        
        /* 4. 让收件箱的标签在手机上排布更合理 */
        .inbox-title { font-size: 18px !important; line-height: 1.8 !important; }
    }

</style>
</head>
<body>
    

<audio id="yujieSound" src="https://tts.baidu.com/text2audio?lan=zh&ie=UTF-8&spd=5&text=%E6%82%A8%E6%9C%89%E6%96%B0%E7%9A%84%E9%82%AE%E4%BB%B6%EF%BC%8C%E8%AF%B7%E6%B3%A8%E6%84%8F%E6%9F%A5%E6%94%B6" preload="auto"></audio>

<div id="customToast">✅ 已开启全能提醒</div>

<div class="main-card">
    <div class="hint-box">
        🌹 <strong>筑梦物语：</strong>在下方输入前缀并点击“自定义邮箱”即可找回属于你的历史邮箱！<br>
        📢 <strong>设置提醒：</strong>点击下方开启按钮并允许权限，最小化浏览器也能收到语音与弹窗提醒！
    </div>

   <h2>LG筑梦电子 📧 无限临时邮箱系统</h2>
    
    <button class="btn-audio-test" onclick="enableAllNotifications()">🔊 开启收件提示音 & 弹窗提醒</button>

    <div class="email-card" id="emailText">正在呼唤筑梦...</div>

    <div class="btn-group">
        <input type="text" id="customInput" placeholder="输入邮箱前缀 (如:LG)">
        <button class="btn-custom" onclick="setCustom()">🌹 自定义邮箱</button>
        <button class="btn-gen" onclick="generateRandom()">🔄 随机生成</button>
    </div>

    <div style="display: flex !important; flex-direction: row !important; gap: 10px !important; margin-top: 15px !important; width: 100% !important; align-items: stretch !important;">
        <button class="btn-copy" onclick="copyEmail()" style="
            flex: 1 !important; 
            height: 45px !important; 
            margin: 0 !important; 
            padding: 0 !important;
            background-color: #e91e63 !important; 
            color: white !important; 
            border: none !important; 
            border-radius: 8px !important; 
            font-weight: bold !important; 
            cursor: pointer !important;
            display: flex !important; 
            align-items: center !important; 
            justify-content: center !important;
            font-size: 14px !important;
        ">
            📋 复制地址
        </button>

        <button onclick="window.location.href='/'" style="
            flex: 1 !important; 
            height: 45px !important; 
            margin: 0 !important; 
            padding: 0 !important;
            background-color: #f06292 !important; 
            color: white !important; 
            border: none !important; 
            border-radius: 8px !important; 
            font-weight: bold !important; 
            cursor: pointer !important;
            display: flex !important; 
            align-items: center !important; 
            justify-content: center !important;
            font-size: 14px !important;
        ">
            🏠 返回主页
        </button>
    </div>
   
    <div class="inbox-card">
        <div class="inbox-header">
            <h3 class="inbox-title">
                📥 筑梦收件箱 
                <span class="status-tag" id="audioStatus">🔇 提醒未激活</span>
                <span class="refresh-timer" id="timerDisplay">5s 刷新</span>
            </h3>
            <button class="btn-refresh-inbox" onclick="manualRefresh()">🔄 手动刷新</button>
        </div>
        <div id="emailList">
            <p style="text-align:center; color:#999; padding-top:80px;">正在连接筑梦电子...</p>
        </div>
    </div>
</div>

<script>
    // ✅ 核心配置
    const API_BASE = "https://guo.roselg.xyz/api/emails";
    const DOMAIN = "@roselg.xyz";
    let currentEmail = "";
    let timeLeft = 5; 
    let lastEmailCount = -1;
    let isNotifActive = false;
    let rollInterval; // 👈 新增这一行：用来控制滚动动画
    // 🔑 新增：用于权限校验和设备锁定
    let authCode = localStorage.getItem('authCode') || '';
    let deviceId = localStorage.getItem('deviceId') || ('dev_' + Math.random().toString(36).substring(2, 12));
    localStorage.setItem('deviceId', deviceId);
    function enableAllNotifications() {
        isNotifActive = true;
        const statusTag = document.getElementById('audioStatus');
        statusTag.innerText = "🔊 提醒已开启";
        statusTag.style.background = "#e8f5e9";
        statusTag.style.color = "#4caf50";
        playVoice();

        if ("Notification" in window) {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    showToast("✅ 语音与弹窗提醒已同步开启");
                } else {
                    showToast("⚠️ 弹窗权限被拒绝，仅开启语音");
                }
            });
        }
    }

    function playVoice() {
        const sound = document.getElementById("yujieSound");
        sound.currentTime = 0;
        sound.play().catch(e => {
            const msg = new SpeechSynthesisUtterance("您有新的邮件，请注意查收");
            msg.lang = 'zh-CN';
            window.speechSynthesis.speak(msg);
        });
    }

    function pushDesktopNotice(subject, from) {
        if (Notification.permission === "granted") {
            new Notification("🌹 LG筑梦系统：新邮件", {
                body: `来自: ${from}\n主题: ${subject}`,
                icon: "https://cdn-icons-png.flaticon.com/512/2907/2907253.png"
            });
        }
    }

    function showToast(msg) {
        const toast = document.getElementById("customToast");
        toast.innerText = msg;
        toast.className = "show";
        setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2500);
    }
function generateRandom() {
        const rand = Math.random().toString(36).substring(2, 10);
        // 传入 true，表示触发“彩票滚动”特效
        updateDisplay(rand + DOMAIN, true);
    }

    function setCustom() {
        const val = document.getElementById('customInput').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
        if(!val) return showToast("⚠️ 请输入前缀");
        // 自定义输入不需要滚动，传入 false
        updateDisplay(val + DOMAIN, false);
    }

    function updateDisplay(email, isRandom = false) {
        const textElement = document.getElementById('emailText');
        
        // 每次点击先清空上一次的动画，防止疯狂点击导致重叠
        clearInterval(rollInterval); 

        if (isRandom) {
            // 🎰 开启老虎机滚动特效
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let iterations = 0;
            const maxIterations = 15; // 滚动的总次数，数字越大滚得越久
            
            rollInterval = setInterval(() => {
                let randomPrefix = '';
                // 提取要生成的邮箱前缀长度
                const prefixLength = email.indexOf('@');
                
                // 疯狂生成随机字符
                for (let i = 0; i < prefixLength; i++) {
                    randomPrefix += chars[Math.floor(Math.random() * chars.length)];
                }
                
                // 让页面上的发光字快速跳动
                textElement.innerText = randomPrefix + DOMAIN;
                
                iterations++;
                if (iterations >= maxIterations) {
                    clearInterval(rollInterval);
                    // 动画结束，锁定最终生成的邮箱！
                    finalizeUpdate(email);
                }
            }, 40); // 每次跳动的时间间隔(毫秒)，40ms速度极快，效果拉满！
        } else {
            // 如果是用户自己填的自定义邮箱，直接显示，不磨叽
            finalizeUpdate(email);
        }
    }

    // 真正执行网络请求和界面锁定的函数
    function finalizeUpdate(email) {
        currentEmail = email;
        document.getElementById('emailText').innerText = currentEmail;
        lastEmailCount = -1; 
        timeLeft = 5; 
        fetchEmails(); // 去拉取这封新邮箱的邮件
    }
    

    function copyEmail() {
        if(!currentEmail) return;
        navigator.clipboard.writeText(currentEmail).then(() => {
            showToast("📋 邮箱地址已复制");
        });
    }

    function startCountdown() {
        setInterval(() => {
            timeLeft--;
            if (timeLeft < 0) {
                fetchEmails();
                timeLeft = 5;
            }
            document.getElementById('timerDisplay').innerText = `${timeLeft}s 刷新`;
        }, 1000);
    }

    function manualRefresh() {
        fetchEmails();
        timeLeft = 5; 
        showToast("🔄 正在从筑梦电子刷新...");
    }

    function fetchEmails() {
        if(!currentEmail) return;
        
        // 加时间戳防止本地缓存
        const timestamp = new Date().getTime();
        
        fetch(`${API_BASE}?address=${currentEmail}&t=${timestamp}`)
            .then(res => {
                if (!res.ok) throw new Error(`HTTP 状态码: ${res.status}`);
                return res.json();
            })
            .then(data => {
                if (lastEmailCount !== -1 && data.length > lastEmailCount) {
                    const newMail = data[0]; 
                    if(isNotifActive) {
                        playVoice();
                        pushDesktopNotice(newMail.subject, newMail.from);
                    }
                }
                lastEmailCount = data.length;

                const list = document.getElementById('emailList');
                if(data.length === 0) {
                    list.innerHTML = `<p style="text-align:center; color:#999; padding-top:80px;">暂无新邮件</p>`;
                } else {
                    list.innerHTML = data.map(mail => `
                        <div style="background:#fff; padding:20px; margin-bottom:15px; border-radius:12px; border-left:6px solid var(--rose-main); box-shadow: 0 4px 15px rgba(0,0,0,0.04);">
                            <div style="font-size:13px; color:#888; margin-bottom:8px;">来自: ${mail.from}</div>
                            <div style="font-weight:bold; color:var(--rose-main); font-size:18px; margin-bottom:10px;">${mail.subject}</div>
                            <div style="margin-top:10px; font-size:14px; color:#444; line-height:1.6; background:#fcfcfc; padding:15px; border-radius:8px;">${mail.html || mail.text}</div>
                        </div>
                    `).join('');
                }
            })
            .catch(err => {
                console.error("Fetch Error:", err);
                document.getElementById('emailList').innerHTML = `
                    <div style="text-align:center; padding-top:60px; color:red;">
                        <p>❌ 接口连接失败</p>
                        <p style="font-size:12px; color:#666;">原因: ${err.message}</p>
                        <p style="font-size:11px; color:#999;">请确保已通过 https:// 访问此网页</p>
                    </div>
                `;
            });
    }

    generateRandom();
    startCountdown();
    // 🔒 渲染收件箱锁定状态（只在收件箱区域显示）
function renderLockedInbox(message = "授权后即可查看实时收件箱") {
    const container = document.getElementById('emailContainer');
    if (!container) return;
    container.innerHTML = `
        <div style="padding: 40px 20px; text-align: center; border: 2px dashed #ff69b4; border-radius: 15px; margin: 20px; background: rgba(0,0,0,0.2); backdrop-filter: blur(5px);">
            <div style="font-size: 40px; margin-bottom: 15px;">🔒</div>
            <h3 style="color: #fff; margin-bottom: 20px;">${message}</h3>
            <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                <input type="password" id="inboxAuthInput" placeholder="输入授权码..." style="padding: 12px; border-radius: 8px; border: 1px solid #ff69b4; background: rgba(255,255,255,0.1); color: #fff; width: 200px; outline: none;">
                <button onclick="unlockInbox()" style="padding: 10px 25px; border-radius: 8px; background: #ff69b4; color: #fff; border: none; cursor: pointer; font-weight: bold; box-shadow: 0 0 10px #ff69b4;">立即解锁</button>
            </div>
            <p style="color: #aaa; font-size: 12px; margin-top: 15px;">一人一码，异地登录将自动互踢</p>
        </div>
    `;
}

// 🔓 执行解锁逻辑
async function unlockInbox() {
    const code = document.getElementById('inboxAuthInput').value.trim();
    if(!code) return showToast("⚠️ 请输入授权码");
    
    try {
        const response = await fetch('https://guo.roselg.xyz/api/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code, deviceId: localStorage.getItem('deviceId') })
        });
        const result = await response.json();
        
        if (result.success) {
            localStorage.setItem('authCode', code);
            showToast("✅ 授权成功");
            location.reload(); // 刷新网页，收件箱就会变回正常
        } else {
            showToast("❌ " + result.error);
        }
    } catch (e) { showToast("❌ 无法连接到验证服务器"); }
}
    // 📩 强化版取邮件函数：自动检查工牌 + 锁死收件箱
    async function fetchEmails() {
        if (!currentEmail) return;
        
        // 1. 从“口袋”里拿出授权码和设备指纹
        const code = localStorage.getItem('authCode');
        const devId = localStorage.getItem('deviceId');

        // 2. 没码就不去请求，直接展示“锁定小窗”
        if (!code) {
            renderLockedInbox(); // 调用咱们刚才加的那个锁
            return;
        }

        try {
            // 3. 带着工牌去请求后端数据
            const response = await fetch(`${API_BASE}?address=${currentEmail}&code=${code}&deviceId=${devId}`);
            
            // 🛑 如果码失效或被踢了 (401/403)
            if (response.status === 401 || response.status === 403) {
                const errData = await response.json();
                localStorage.removeItem('authCode'); // 清掉失效的码
                renderLockedInbox(errData.message || "授权已失效，请重新输入");
                return;
            }

            const data = await response.json();
            
            // 🔊 语音逻辑：如果有新邮件，就播放你那段“御姐音”
            if (data.length > lastEmailCount && lastEmailCount !== -1) {
                document.getElementById('yujieSound').play();
            }
            lastEmailCount = data.length;
            
            // ✅ 调用你原有的渲染函数展示邮件
            renderEmails(data); 

        } catch (e) {
