<body>

<div id="customToast">✅ 已开启全能提醒</div>

<div class="main-card">
    
    <div class="hint-box">
        <p style="margin: 0; letter-spacing: 1px;">
            🌹 筑梦独家：在下方输入前缀并点击 “自定义邮箱” 即可重启曾使用过的邮箱进行邮件的接收！
        </p>
    </div>

    <h2>LG筑梦电子 📧 无限临时邮箱系统</h2>

<div class="layout-row" style="display: flex; align-items: stretch; gap: 15px; margin-bottom: 15px;">
        <div class="email-card" id="emailText" style="flex: 1; margin: 0; display: flex; align-items: center; justify-content: center; padding: 10px;">正在呼唤筑梦电子</div>
        <button class="btn-gen" onclick="generateRandom()" style="margin: 0; width: 115px !important; flex: none !important; white-space: nowrap !important; padding: 0 5px !important; display: flex; align-items: center; justify-content: center;">🔄 随机生成</button>
    </div>

<div class="action-row-main" style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px;">
        <a href="https://guoxingbiao521-blip.github.io/lg-admin-tool-202412/" class="btn-clone admin-theme" target="_blank">⚙️ 站长/代理商管理系统</a>
        <input type="text" id="customInput" placeholder="请输入邮箱前缀">
        <button onclick="setCustomEmail()" class="btn-clone custom-theme">🛠️ 自定义邮箱</button>
    </div>
   

  <div style="display: flex !important; flex-direction: row !important; gap: 10px !important; margin-top: 15px !important; width: 100% !important;">
    <button onclick="copyEmail()" style="flex: 1; height: 45px; background-color: #e91e63; box-shadow: 0 5px 0 #c2185b;">📋 复制地址</button>
    <button onclick="clearEmails()" style="flex: 1; height: 45px; background-color: #d81b60; box-shadow: 0 5px 0 #ad1457;">🗑️ 清空邮件</button>
    <button onclick="window.location.href='index.html'" style="flex: 1; height: 45px; background-color: #f06292; box-shadow: 0 5px 0 #c2185b;">🏠 返回主页</button>
</div>
   
   <div class="inbox-card">
        
        <div class="inbox-header inbox-header-container" style="display: flex; align-items: center; justify-content: space-between; gap: 15px; width: 100%; padding: 0 5px; box-sizing: border-box; border-bottom: 1px solid rgba(255, 182, 193, 0.3); padding-bottom: 15px; margin-bottom: 20px;">
            
            <div style="display: flex; align-items: center; gap: 10px; flex-shrink: 0;">
                <h3 class="inbox-title" style="margin: 0;">📥 筑梦收件箱</h3>
                <span class="refresh-timer" id="timerDisplay">5s 刷新</span>
            </div>
<div class="mobile-hint-text" style="color: #ffffff !important; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);">
    💡 如您没有激活码请返回主页到底部联系站长微信获取
</div>
            
                

            <div style="flex-shrink: 0;">
                <button class="btn-refresh-inbox" onclick="manualRefresh()" style="margin: 0; padding: 8px 16px;">🔄 手动刷新</button>
            </div>
        </div>

        <div id="emailList">
            <p style="text-align:center; color:#999; padding-top:80px;">正在连接筑梦电子...</p>
        </div>

    </div> 
 <script>
    const API_BASE = "https://guo.roselg.xyz/api/emails";
    const DOMAIN = "@roselg.xyz";
    let currentEmail = "";
    let timeLeft = 5; 
    let lastEmailCount = -1;
    let ignoredEmailsCount = 0; // 记录被清理掉的邮件数量
    let rollInterval;

    function showToast(msg) {
        const toast = document.getElementById("customToast");
        toast.innerText = msg;
        toast.className = "show";
        setTimeout(() => { toast.className = ""; }, 2500);
    }

    function generateRandom() {
        const rand = Math.random().toString(36).substring(2, 10);
        updateDisplay(rand + DOMAIN, true);
    }

  function setCustomEmail() {
    const val = document.getElementById('customInput').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
    
    // 1. 如果没填，弹出警告
    if(!val) return showToast("⚠️ 请先输入自定义邮箱前缀");
    
    // 2. 执行原本的更新逻辑
    updateDisplay(val + DOMAIN, false);
    
    // ✨ 3. 加上这一行：成功的心理反馈
    showToast("✅ 自定义邮箱已激活");
}

    function updateDisplay(email, isRandom = false) {
        const textElement = document.getElementById('emailText');
        clearInterval(rollInterval); 
        if (isRandom) {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let iterations = 0;
            rollInterval = setInterval(() => {
                let randomPrefix = '';
                for (let i = 0; i < 8; i++) randomPrefix += chars[Math.floor(Math.random() * chars.length)];
                textElement.innerText = randomPrefix + DOMAIN;
                if (++iterations >= 15) {
                    clearInterval(rollInterval);
                    finalizeUpdate(email);
                }
            }, 40);
        } else {
            finalizeUpdate(email);
        }
    }

    function finalizeUpdate(email) {
        currentEmail = email;
        document.getElementById('emailText').innerText = currentEmail;
        lastEmailCount = -1; 
        timeLeft = 5; 
        fetchEmails();
    }

    function copyEmail() {
        if(!currentEmail) return;
        navigator.clipboard.writeText(currentEmail).then(() => showToast("📋 邮箱地址已复制"));
    }
function clearEmails() {
            if (lastEmailCount <= 0) return showToast("📭 当前没有邮件可清理");
            ignoredEmailsCount = lastEmailCount; // 把目前已有的邮件全部拉黑隐藏
            renderEmails([]); // 瞬间清空画面上的邮件列表
            showToast("🗑️ 邮箱已清理，等待新邮件...");
        }
    function startCountdown() {
        setInterval(() => {
            if (--timeLeft < 0) {
                fetchEmails();
                timeLeft = 5;
            }
            document.getElementById('timerDisplay').innerText = `${timeLeft}s 刷新`;
        }, 1000);
    }

    function manualRefresh() {
        fetchEmails();
        timeLeft = 5; 
        showToast("🔄 正在刷新邮件");
    }

   async function fetchEmails() {
console.log("🔥 [调试] fetchEmails 函数开始运行了！");
    if (!currentEmail) return;



    const code = localStorage.getItem('authCode');
// 第一步：先去档案库里拿
let devId = localStorage.getItem('deviceId');

// 这样改能把以前存错的 "null" 彻底清理掉
if (!devId || devId === "null" || devId === "undefined") {
    devId = 'dev_' + Math.random().toString(36).substring(2, 10);
    localStorage.setItem('deviceId', devId);
}
// 这样就能保证下面的 fetch 请求发出的绝对不是 "null"
  
if (!code) {
        // 核心修复：如果页面上已经有输入框了，说明你正在打字，直接跳过，不许刷新界面
        if (!document.getElementById('authInput')) {
            renderLockedInbox();
        }
        return;
    }
    



    try {
// ✨ 新加的调试代码：在发请求前一秒，把数据打印在控制台
        console.log("🚀 准备拉取邮件 - 验证码:", code, " | 身份证:", devId);
        const response = await fetch(`${API_BASE}?address=${currentEmail}&code=${code}&deviceId=${devId}`);

       
   // --- 处理激活失败 ---
    if (response.status === 401 || response.status === 403) {
        const errData = await response.json();
        localStorage.removeItem('authCode');

        // ✨ 修改这里：把 ❌ 放到最前面，用 + 号把符号和文字接起来
        renderLockedInbox("❌ " + (errData.message || "激活码无效，请重新输入！"));
        return;
    }

    // --- ✨ 优化后的成功提示：只在第一次进入或刚激活时提示 ---
    if (response.ok) {
        // 逻辑：如果这是一个全新的激活操作（比如刚 reload 完），或者系统刚从锁定状态恢复
        if (!window.hasShownSuccessTip) {
            showToast("✅ 验证成功！欢迎使用！");
            window.hasShownSuccessTip = true; // 设为 true，下次自动刷新就不再弹了
        }
    }

   


        const data = await response.json();



        // 🔊 语音 + 🚀 弹窗逻辑

        if (data.length > lastEmailCount && lastEmailCount !== -1) {

            // 调用浏览器语音

            const msg = new SpeechSynthesisUtterance();

            msg.text = "您有新的邮件，请注意查收";

            msg.lang = "zh-CN";

            window.speechSynthesis.speak(msg);



            // 触发系统弹窗

            if (window.Notification && Notification.permission === "granted") {

                const newMail = data[0];

                new Notification("📬 筑梦收件箱新邮件！", {

                    body: `发件人: ${newMail.from}\n主题: ${newMail.subject}`,

                    icon: "https://roselg.xyz/favicon.ico" 

                });

            }

        }
        lastEmailCount = data.length;
        
        // 👇 过滤掉被清理的邮件，只渲染新收到的邮件
        const visibleEmails = data.slice(ignoredEmailsCount); 
        if (typeof renderEmails === 'function') {
            renderEmails(visibleEmails);
        }
      
} catch (e) {
        document.getElementById('emailList').innerHTML = '<p style="color:red; text-align:center; padding-top:50px;">手机端报错: ' + String(e) + '</p>';
    }
  
}

    function renderEmails(emails) {
        const container = document.getElementById('emailList');
        if (!emails || emails.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#999; padding-top:80px;">暂无新邮件，筑梦系统将实时获取最新邮件！</p>';
            return;
        }
       // ✨ 加上 .reverse()，让最新获取的邮件反转到数组最前面
        container.innerHTML = emails.reverse().map(mail => `
            <div style="background: rgba(30, 30, 35, 0.95); border-radius: 15px; padding: 20px; margin-bottom: 20px; border-left: 5px solid #ff6b81; text-align: left; color:#fff;">
                <div style="font-size: 13px; color: #ffb8c6;">来自：${mail.from}</div>
                <div style="font-size: 18px; font-weight: bold; margin: 10px 0;">主题：${mail.subject}</div>
                <div style="background: #fff; color: #333; padding: 15px; border-radius: 10px;">${mail.html || mail.text}</div>
            </div>
        `).join('');
    }

 function renderLockedInbox(msg = "激活后即可查看实时邮件") {
        const container = document.getElementById('emailList');
        if (!container) return;
        container.innerHTML = `
            <div style="padding: 40px 20px; text-align: center; border: 2px dashed #ff69b4; border-radius: 15px; margin: 20px; background: transparent;">
                <div style="font-size: 40px; margin-bottom: 15px;">🔒</div>
                <h3 style="color: #fff; margin-bottom: 20px;">${msg}</h3>
                <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; align-items: center;">
                    <input type="password" id="authInput" placeholder="输入激活码..." style="padding: 12px; border-radius: 8px; border: 1px solid #ff69b4; background: rgba(255,255,255,0.1); color: #fff; width: 200px; outline: none;">
                    <button onclick="unlock()" style="padding: 12px 25px; border-radius: 8px; background: #ff69b4; color: #fff; border: none; cursor: pointer; font-weight: bold; box-shadow: 0 5px 0 #c2185b; white-space: nowrap;">立即激活</button>
                </div>
                <p style="color: #aaa; font-size: 12px; margin-top: 15px;">⚠️温馨提醒：一人一码，系统自动检测，多人共用激活码将自动失效！</p>
            </div>
        `;
    }
 async function unlock() {
    const codeInput = document.getElementById('authInput');
    const code = codeInput.value.trim();
    
    // 1. 基本检查
    if (!code) return showToast("⚠️ 请输入激活码");

    // ✨ 核心：激活时必须带上“身份证”，否则服务器没法踢掉旧设备
    const devId = localStorage.getItem('deviceId');

    showToast("🔍 正在验证并绑定设备...");

    try {
        // 2. 发送到服务器的验证接口（POST）
        const response = await fetch(`${API_BASE.replace('emails', 'verify')}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: code, deviceId: devId })
        });

        const data = await response.json();

        if (response.ok) {
            // 3. 验证成功，保存激活码并刷新
            localStorage.setItem('authCode', code);
            showToast("✅ 激活成功，欢迎使用");
            setTimeout(() => {
                location.reload();
            }, 800);
        } else {
            // 4. 验证失败（比如码写错了）
            showToast("❌ " + (data.error || "无法激活，激活码无效！"));
        }
    } catch (error) {
        console.error("激活请求失败:", error);
        showToast("🌐 网络错误，请稍后重试！");
    }
}

    // 初始化
    if (!localStorage.getItem('deviceId')) localStorage.setItem('deviceId', 'dev_' + Math.random().toString(36).substring(2, 10));
    if (window.Notification) {
    Notification.requestPermission().catch(e => console.log("弹窗权限被忽略"));
}
    generateRandom();
    startCountdown();
</script>
</body>
</html>
