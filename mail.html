<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌹 LG筑梦电子无限临时邮箱系统 🌹</title>
    <style>
        :root { 
            --rose-main: #d63384; --rose-dark: #a02060; --rose-bg: #fff0f5; --rose-border: #ffb6c1; 
            --blue-main: #0078D7; --blue-dark: #005a9e; --green-main: #4caf50; --green-dark: #388e3c;
            --purple-main: #da70d6; --purple-dark: #b359b0;
        }

        body { 
            font-family: 'Microsoft YaHei', sans-serif; text-align: center; margin: 0; padding-top: 30px; 
            background: url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=2000&auto=format&fit=crop') center/cover fixed; 
        }
        
        .main-card { 
            background: rgba(255, 255, 255, 0.96); padding: 40px; border-radius: 24px; box-shadow: 0 12px 50px rgba(0,0,0,0.15); 
            display: inline-block; width: 680px; max-width: 95%; backdrop-filter: blur(10px); border: 2px solid var(--rose-border); position: relative; 
        }
        
        .hint-box { 
            background-color: #fff9fa; color: #b0003a; padding: 15px 20px; border-left: 5px solid #ff69b4; 
            border-radius: 8px; margin-bottom: 30px; font-size: 14px; text-align: left; line-height: 1.8; border: 1px solid var(--rose-border); border-left-width: 5px;
        }
        
        h2 { color: var(--rose-main); margin-top: 0; font-size: 28px; letter-spacing: 1px; margin-bottom: 25px; } 
        
        .email-card { 
            font-size: 32px; font-weight: bold; color: #c2185b; margin: 20px 0; padding: 25px; 
            background: var(--rose-bg); border-radius: 16px; border: 2px dashed #ff69b4; word-break: break-all; 
            box-shadow: inset 0 2px 10px rgba(255,105,180,0.1); 
        }
        
        button { 
            font-size: 15px; padding: 12px 24px; cursor: pointer; border: none; border-radius: 12px; 
            color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 6px; 
            position: relative; transition: all 0.1s; user-select: none;
        }
        .btn-custom { background: var(--purple-main); box-shadow: 0 5px 0 var(--purple-dark); }
        .btn-gen { background: var(--rose-main); box-shadow: 0 5px 0 var(--rose-dark); }
        .btn-copy { background: var(--blue-main); box-shadow: 0 5px 0 var(--blue-dark); width: 100%; max-width: 500px; margin: 10px auto; }
        .btn-refresh-inbox { background: var(--green-main); box-shadow: 0 4px 0 var(--green-dark); padding: 8px 18px; font-size: 14px; }
        .btn-audio-test { background: #607d8b; box-shadow: 0 4px 0 #455a64; padding: 10px 20px; font-size: 15px; margin: 0 auto 20px auto; }

        button:active { transform: translateY(4px) !important; box-shadow: 0 1px 0 rgba(0,0,0,0.2) !important; }

        .btn-group { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; }
        input[type="text"] { padding: 12px 15px; font-size: 16px; border: 2px solid var(--rose-border); border-radius: 12px; outline: none; width: 200px; text-align: center; }
        
        .inbox-card { margin-top: 40px; text-align: left; background: #fff; padding: 25px; border-radius: 18px; border: 1px solid var(--rose-border); min-height: 300px; }
        .inbox-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--rose-bg); padding-bottom: 15px; margin-bottom: 20px; }
        .inbox-title { margin: 0; color: #c2185b; font-size: 22px; }
        
        .status-tag { font-size: 11px; color: #888; background: #f5f5f5; padding: 3px 8px; border-radius: 10px; font-weight: normal; margin-left: 5px; border: 1px solid #ddd; }
        .refresh-timer { font-size: 13px; color: #999; font-weight: normal; margin-left: 5px; background: #fef0f5; padding: 2px 8px; border-radius: 20px; border: 1px solid var(--rose-border); }

        #customToast {
            visibility: hidden; min-width: 200px; background-color: rgba(0, 0, 0, 0.85); color: #fff;
            text-align: center; border-radius: 12px; padding: 18px 30px; position: fixed;
            z-index: 1000; left: 50%; top: 50%; transform: translate(-50%, -50%);
            font-size: 16px; font-weight: bold; backdrop-filter: blur(8px); box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        #customToast.show { visibility: visible; animation: fadeInOut 2.5s; }
        @keyframes fadeInOut { 0% {opacity: 0; transform: translate(-50%, -40%);} 15% {opacity: 1; transform: translate(-50%, -50%);} 85% {opacity: 1; transform: translate(-50%, -50%);} 100% {opacity: 0; transform: translate(-50%, -60%);} }
    </style>
</head>
<body>

<audio id="yujieSound" src="https://tts.baidu.com/text2audio?lan=zh&ie=UTF-8&spd=5&text=%E6%82%A8%E6%9C%89%E6%96%B0%E7%9A%84%E9%82%AE%E4%BB%B6%EF%BC%8C%E8%AF%B7%E6%B3%A8%E6%84%8F%E6%9F%A5%E6%94%B6" preload="auto"></audio>

<div id="customToast">✅ 已开启全能提醒</div>

<div class="main-card">
    <div class="hint-box">
        🌹 <strong>玫瑰物语：</strong>在下方输入名字并点击“使用自定义名字”即可找回属于你的历史邮件！<br>
        📢 <strong>天窗提醒：</strong>点击下方开启按钮并允许权限，最小化浏览器也能收到提醒。
    </div>

    <h2>🌹 LG筑梦电子无限临时邮箱系统 🌹</h2>
    
    <button class="btn-audio-test" onclick="enableAllNotifications()">🔊 开启收件提示音 & 天窗提醒</button>

    <div class="email-card" id="emailText">正在呼唤玫瑰...</div>

    <div class="btn-group">
        <input type="text" id="customInput" placeholder="输入名字 (如: test)">
        <button class="btn-custom" onclick="setCustom()">🌹 使用自定义名字</button>
        <button class="btn-gen" onclick="generateRandom()">🔄 随机生成地址</button>
    </div>

    <button class="btn-copy" onclick="copyEmail()">📋 复制完整邮箱地址</button>

    <div class="inbox-card">
        <div class="inbox-header">
            <h3 class="inbox-title">
                📥 玫瑰收件箱 
                <span class="status-tag" id="audioStatus">🔇 提醒未激活</span>
                <span class="refresh-timer" id="timerDisplay">5s 刷新</span>
            </h3>
            <button class="btn-refresh-inbox" onclick="manualRefresh()">🔄 手动刷新</button>
        </div>
        <div id="emailList">
            <p style="text-align:center; color:#999; padding-top:80px;">正在连接玫瑰花园...</p>
        </div>
    </div>
</div>

<script>
    // ✅ 核心配置：使用 HTTPS 域名，确保与 Nginx 逻辑一致
    const API_BASE = "https://guo.roselg.xyz/api/emails"; 
    const DOMAIN = "@roselg.xyz";
    let currentEmail = "";
    let timeLeft = 5; 
    let lastEmailCount = -1;
    let isNotifActive = false;

    function enableAllNotifications() {
        isNotifActive = true;
        const statusTag = document.getElementById('audioStatus');
        statusTag.innerText = "🔊 提醒已开启";
        statusTag.style.background = "#e8f5e9";
        statusTag.style.color = "#4caf50";
        playVoice();

        if ("Notification" in window) {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    showToast("✅ 语音与天窗提醒已同步开启");
                } else {
                    showToast("⚠️ 天窗权限被拒绝，仅开启语音");
                }
            });
        }
    }

    function playVoice() {
        const sound = document.getElementById("yujieSound");
        sound.currentTime = 0;
        sound.play().catch(e => {
            const msg = new SpeechSynthesisUtterance("您有新的邮件，请注意查收");
            msg.lang = 'zh-CN';
            window.speechSynthesis.speak(msg);
        });
    }

    function pushDesktopNotice(subject, from) {
        if (Notification.permission === "granted") {
            new Notification("🌹 LG玫瑰系统：新邮件", {
                body: `来自: ${from}\n主题: ${subject}`,
                icon: "https://cdn-icons-png.flaticon.com/512/2907/2907253.png"
            });
        }
    }

    function showToast(msg) {
        const toast = document.getElementById("customToast");
        toast.innerText = msg;
        toast.className = "show";
        setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2500);
    }

    function generateRandom() {
        const rand = Math.random().toString(36).substring(2, 10);
        updateDisplay(rand + DOMAIN);
    }

    function setCustom() {
        const val = document.getElementById('customInput').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
        if(!val) return showToast("⚠️ 请输入名字");
        updateDisplay(val + DOMAIN);
    }

    function updateDisplay(email) {
        currentEmail = email;
        document.getElementById('emailText').innerText = currentEmail;
        lastEmailCount = -1; 
        timeLeft = 5; 
        fetchEmails();
    }

    function copyEmail() {
        if(!currentEmail) return;
        navigator.clipboard.writeText(currentEmail).then(() => {
            showToast("📋 地址已复制");
        });
    }

    function startCountdown() {
        setInterval(() => {
            timeLeft--;
            if (timeLeft < 0) {
                fetchEmails();
                timeLeft = 5;
            }
            document.getElementById('timerDisplay').innerText = `${timeLeft}s 刷新`;
        }, 1000);
    }

    function manualRefresh() {
        fetchEmails();
        timeLeft = 5; 
        showToast("🔄 正在从玫瑰花园刷新...");
    }

    function fetchEmails() {
        if(!currentEmail) return;
        
        // 加时间戳防止本地缓存
        const timestamp = new Date().getTime();
        
        fetch(`${API_BASE}?address=${currentEmail}&t=${timestamp}`)
            .then(res => {
                if (!res.ok) throw new Error(`HTTP 状态码: ${res.status}`);
                return res.json();
            })
            .then(data => {
                if (lastEmailCount !== -1 && data.length > lastEmailCount) {
                    const newMail = data[0]; 
                    if(isNotifActive) {
                        playVoice();
                        pushDesktopNotice(newMail.subject, newMail.from);
                    }
                }
                lastEmailCount = data.length;

                const list = document.getElementById('emailList');
                if(data.length === 0) {
                    list.innerHTML = `<p style="text-align:center; color:#999; padding-top:80px;">暂无新邮件</p>`;
                } else {
                    list.innerHTML = data.map(mail => `
                        <div style="background:#fff; padding:20px; margin-bottom:15px; border-radius:12px; border-left:6px solid var(--rose-main); box-shadow: 0 4px 15px rgba(0,0,0,0.04);">
                            <div style="font-size:13px; color:#888; margin-bottom:8px;">来自: ${mail.from}</div>
                            <div style="font-weight:bold; color:var(--rose-main); font-size:18px; margin-bottom:10px;">${mail.subject}</div>
                            <div style="margin-top:10px; font-size:14px; color:#444; line-height:1.6; background:#fcfcfc; padding:15px; border-radius:8px;">${mail.html || mail.text}</div>
                        </div>
                    `).join('');
                }
            })
            .catch(err => {
                console.error("Fetch Error:", err);
                document.getElementById('emailList').innerHTML = `
                    <div style="text-align:center; padding-top:60px; color:red;">
                        <p>❌ 接口连接失败</p>
                        <p style="font-size:12px; color:#666;">原因: ${err.message}</p>
                        <p style="font-size:11px; color:#999;">请确保已通过 https:// 访问此网页</p>
                    </div>
                `;
            });
    }

    generateRandom();
    startCountdown();
</script>

</body>
</html>
