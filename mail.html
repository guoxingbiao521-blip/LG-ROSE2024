        /* =======================================
           🚀 终极沉浸式邮件弹窗样式 
           ======================================= */
        /* 弹窗遮罩：极暗底色，解决安卓滑动 Bug 的第一道防线 */
        .email-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.88); /* 极暗遮罩，只透出微弱背景 */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 99999;
            display: none; /* 默认隐藏 */
            justify-content: center;
            align-items: center;
            overscroll-behavior: none; /* 阻止滑动穿透 */
        }

        /* 弹窗核心框 */
        .email-modal-box {
            background: rgba(15, 15, 20, 0.95);
            border: 2px solid rgba(255, 105, 180, 0.6);
            border-radius: 20px;
            width: 92%;
            max-width: 650px;
            max-height: 85vh; /* 保证框不会超出屏幕 */
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(255, 105, 180, 0.3);
            animation: modalPop 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); /* Q弹动画 */
        }

        @keyframes modalPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-header-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px 20px 0 0;
        }

    /* 🎯 修复1：3D 立体 Q弹关闭按钮，匹配主页风格 */
        .modal-close-btn {
            background-color: #d81b60; /* 玫瑰红主题色 */
            border: none;
            color: white; 
            padding: 8px 16px; 
            border-radius: 12px;
            cursor: pointer; 
            font-weight: bold; 
            margin: 0; 
            box-shadow: 0 5px 0 #ad1457; /* 3D 立体底部阴影 */
            transition: all 0.1s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .modal-close-btn:hover { 
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 7px 15px rgba(216, 27, 96, 0.4), 0 5px 0 #ad1457; 
        }

            transform: translateY(4px) !important;
            box-shadow: 0 1px 0 #ad1457 !important; /* 点击时的真实下压回弹 */
        }

        #modalEmailContent {

        }

<script>

    function showToast(msg) {
        const toast = document.getElementById("customToast");
        toast.innerText = msg;
        toast.className = "show";
        setTimeout(() => { toast.className = ""; }, 2500);

    function generateRandom() {

  function setCustomEmail() {
    const inputEl = document.getElementById('customInput');
    let val = inputEl.value.trim(); 
    
    if(!val) {
        showToast("⚠️ 请先输入邮箱前缀");
        return;
    }

    /* 🚀 第二道防线：点击生成时的“结构合法性”国际标准检测 */

    // 1. 基础防护：完全对齐你底部的 RFC 国际标准符号库
    // 允许：大小写字母、数字，以及所有符合国际标准的特殊符号
    const validRegex = /^[a-zA-Z0-9!#$%&'*+\-\/=?^_`{|}~.]+$/;
    if (!validRegex.test(val)) {
        showToast("❌ 包含非法字符，请检查输入！");
        return; 
    }

    // 2. 核心拦截：必须包含至少一个字母或数字（彻底杜绝纯符号，如 "---" 或 "..."）
    if (!/[a-zA-Z0-9]/.test(val)) {
        showToast("❌ 邮箱名不能全是符号，必须包含字母或数字");
        return;
    }

    // 3. 规范拦截：不能以符号开头或结尾（国际互联网 RFC 标准强制要求）
    if (/^[^a-zA-Z0-9]|[^a-zA-Z0-9]$/.test(val)) {
        showToast("❌ 邮箱名必须以字母或数字作为开头和结尾");
        return;
    }

    // 4. 严谨拦截：RFC 标准规定邮箱名不能包含连续的点号 (例如 a..b)
    if (/\.\./.test(val)) {
        showToast("❌ 邮箱名不能包含连续的点号(.)");
        return;
    }

    // 检测全部通过，激活邮箱
    updateDisplay(val + DOMAIN, false);
    showToast("✅ 自定义邮箱已激活");
}
    function updateDisplay(email, isRandom = false) {
        const textElement = document.getElementById('emailText');
        clearInterval(rollInterval); 
        if (isRandom) {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789@.';
            let iterations = 0;
            const targetLength = email.length;
            rollInterval = setInterval(() => {
                let randomStr = '';
                for (let i = 0; i < targetLength; i++) randomStr += chars[Math.floor(Math.random() * chars.length)];
                textElement.innerText = randomStr; 
                if (++iterations >= 15) {
                    clearInterval(rollInterval);
                    finalizeUpdate(email);
                    showToast("✅ 随机邮箱已激活");
                }
            }, 40);
        } else {
            finalizeUpdate(email);
        }
    }

    function finalizeUpdate(email) {
        currentEmail = email;
        document.getElementById('emailText').innerText = currentEmail;
        lastEmailCount = -1; 
        timeLeft = 5; 
        fetchEmails();
    }

    function copyEmail() {
        if(!currentEmail) return;
        window.copyToClipboard(currentEmail, "📋 邮箱地址已复制");
    }

    function clearEmails() {
        if (!fullServerEmails || fullServerEmails.length === 0) return showToast("📭 当前没有邮件可清理");
        const maxTimestamp = Math.max(...fullServerEmails.map(m => m.timestamp || 0));
        const cutoffTime = maxTimestamp > 0 ? maxTimestamp : Date.now();
        localStorage.setItem('clearTime_' + currentEmail, cutoffTime);
        renderEmails([]); 
        showToast("🗑️ 邮箱已清理，等待新邮件...");
    }

    function startCountdown() {
        setInterval(() => {
            if (--timeLeft < 0) {
                fetchEmails();
                timeLeft = 5;
            }
            document.getElementById('timerDisplay').innerText = `${timeLeft}s 刷新`;
        }, 1000);
    }

    function manualRefresh() {
        fetchEmails();
        timeLeft = 5; 
        showToast("🔄 正在刷新邮件");
    }

    async function fetchEmails() {
        if (!currentEmail) return;
        const code = localStorage.getItem('authCode');
        let devId = localStorage.getItem('deviceId');
        if (!devId || devId === "null" || devId === "undefined") {
            devId = 'dev_' + Math.random().toString(36).substring(2, 10);
            localStorage.setItem('deviceId', devId);
        }
        if (!code) {
            if (!document.getElementById('authInput')) renderLockedInbox();
            return;
        }

        try {
            const response = await fetch(`${API_BASE}?address=${currentEmail}&code=${code}&deviceId=${devId}`);
            if (response.status === 401 || response.status === 403) {
                localStorage.removeItem('authCode');
                renderLockedInbox("❌ 激活码无效，请重新输入！");
                return;
            }
            const data = await response.json();
            fullServerEmails = data;

            let cutoffTime = parseInt(localStorage.getItem('clearTime_' + currentEmail) || '0');
            const visibleEmails = data.filter(mail => {
                if (mail.timestamp) return mail.timestamp > cutoffTime;
                return true; 
            });

            // 🎯 修复：先渲染数据，确保 window.currentVisibleEmails 被赋值
            if (typeof renderEmails === 'function') {
                renderEmails(visibleEmails);
            }

            // 🎯 然后再执行语音播报和自动弹窗逻辑
            if (visibleEmails.length > lastEmailCount && lastEmailCount !== -1) {
                try {
                    if (typeof window.SpeechSynthesisUtterance !== 'undefined' && window.speechSynthesis) {
                        const msg = new SpeechSynthesisUtterance("您有新的邮件,请注意查收！");

            lastEmailCount = visibleEmails.length;
          
        } catch (e) {
            document.getElementById('emailList').innerHTML = '<p style="color:red; text-align:center; padding-top:50px;">系统繁忙: ' + String(e) + '</p>';
        }
    }

    function getSmartVCode(html, text) {
        const cleanText = (html || text || "").replace(/<[^>]*>/g, ' ');
        const commonGarbage = ['2024','2025','2026','DESIGN','LIMITLESS','CREATIVITY','SUPPORT'];
        const candidates = cleanText.match(/\b[A-Z0-9]{4,8}\b/g) || [];
        const filtered = candidates.filter(c => !commonGarbage.includes(c.toUpperCase()));
        if (filtered.length === 0) return null;
        return filtered.sort((a, b) => {
            const aHasAlpha = /[A-Z]/.test(a), aHasNum = /\d/.test(a);
            const bHasAlpha = /[A-Z]/.test(b), bHasNum = /\d/.test(b);
            if ((aHasAlpha && aHasNum) && !(bHasAlpha && bHasNum)) return -1;
            if (!(aHasAlpha && aHasNum) && (bHasAlpha && bHasNum)) return 1;
            if (a.length === 6 && b.length !== 6) return -1;
            if (a.length !== 6 && b.length === 6) return 1;
            return 0;
        })[0];
    }

function renderEmails(emails) {
        // 🚀 性能优化 V2.0：生成数据指纹，拦截无效渲染 (消除 DOM 抖动)
        // 把所有邮件的时间戳拼成一串字符串作为指纹，如果没有邮件就是 'empty'
        const currentFingerprint = emails.length === 0 ? 'empty' : emails.map(m => m.timestamp).join('|');
        
        // 如果当前指纹和上一次渲染的指纹完全一样，说明没有新邮件也没有被清空
        if (window.lastRenderedFingerprint === currentFingerprint) {
            return; // 🛑 数据没变，直接罢工，绝对不碰底层 DOM！
        }
        // 记录新的指纹
        window.lastRenderedFingerprint = currentFingerprint;

        // 🎯 修复：使用解构翻转，确保索引绝对匹配最新邮件
        window.currentVisibleEmails = [...emails].reverse(); 
        const container = document.getElementById('emailList');
        
        if (!emails || emails.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#999; padding-top:80px;">暂无新邮件，筑梦系统将实时获取最新邮件！</p>';
            return;
        }

        container.innerHTML = window.currentVisibleEmails.map((mail, index) => {
            let timeString = "时间未知";
            if(mail.timestamp) {
                const d = new Date(mail.timestamp);
                timeString = `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`;
            }
            const vCode = getSmartVCode(mail.html, mail.text);
            
            return `
            <div class="mail-item-box" onclick="openEmailModal(${index}, '${timeString}')" style="cursor: pointer;">
                ${vCode ? `
                <button onclick="copyToClipboard('${vCode}', '✅ 验证码 ${vCode} 已复制'); event.stopPropagation();" class="vcode-btn-admin-clone">
                    ⚡ 一键复制验证码
                </button>
                ` : ''}
                <div class="mail-meta-group">
                    <div class="meta-item">👤 发件：${mail.from}</div>
                    <div class="meta-item">📅 时间：${timeString}</div>
                    <div class="subject-item">📑 主题：${mail.subject}</div>
                </div>                
                <div class="mail-content-hd">
                    ${mail.html || mail.text}
                </div>
            </div>`;
        }).join('');
    }

    window.copyToClipboard = function(text, msg) {
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(() => { showToast(msg); }).catch(() => { fallbackCopy(text, msg); });
        } else { fallbackCopy(text, msg); }
    };

    function fallbackCopy(text, msg) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed"; textArea.style.top = "-9999px";
        document.body.appendChild(textArea);
        if (navigator.userAgent.match(/ipad|iphone|mac/i)) {
            const range = document.createRange();
            range.selectNodeContents(textArea);
            const selection = window.getSelection();
            selection.removeAllRanges(); selection.addRange(range);
            textArea.setSelectionRange(0, 999999);
        } else { textArea.select(); }
        try { if(document.execCommand('copy')) showToast(msg); } catch (err) {}
        document.body.removeChild(textArea);
    }
    
    function renderLockedInbox(msg = "激活后即可查看实时邮件") {
        const container = document.getElementById('emailList');
        if (!container) return;
        container.innerHTML = `

async function unlock() {

            body: JSON.stringify({ 
                code: code, 
                deviceId: devId,

        const data = await response.json();
        
        if (response.ok) {
            localStorage.setItem('authCode', code);
            if (data.isAdmin) {
                showToast(`👑 欢迎归来，站长！\n----------------\n🔥 核心特权已全部解锁\n🚀 正在载入最高管理系统...`);
            } else {
                showToast(`✅ 激活成功！\n----------------\n🔋 剩余次数：${data.leftUsage}\n⏳ 剩余时间：${data.expireMsg}`);
            }
            setTimeout(() => location.reload(), 2500);
        } else {
            showToast("❌ " + (data.error || "激活码无效！"));
        }
    } catch (error) {
        showToast("🌐 网络错误");
    }
}
    if (!localStorage.getItem('deviceId')) localStorage.setItem('deviceId', 'dev_' + Math.random().toString(36).substring(2, 10));
    if (window.Notification) Notification.requestPermission();
    
    document.getElementById('customInput').addEventListener('input', function(e) {
        const originalVal = this.value;
        const newVal = originalVal.replace(/[^a-zA-Z0-9!#$%&'*+\-\/=?^_`{|}~.]/g, '');
        if (originalVal !== newVal) { this.value = newVal; showToast("⚠️ 只能输入合法的邮箱前缀哦！"); }
    });

    generateRandom();
    startCountdown();
// 🚀 Step 3：打开沉浸式详情弹窗

window.closeEmailModal = function() {
    document.querySelectorAll('.email-modal-overlay').forEach(m => {
        m.style.display = 'none';
    });
    // 解除页面底层的滑动锁定
    document.body.classList.remove('no-scroll', 'hide-ui-for-modal');
};
  window.openEmailModal = function(index, timeString) {
        if (window.innerWidth > 1050) return; 

        const mail = window.currentVisibleEmails[index];
        if(!mail) return;
        const vCode = getSmartVCode(mail.html, mail.text);
        let content = mail.html || mail.text;
        
        let hintHtml = ''; 
        let giantVCodeBox = ''; // 🌟 新增：提炼出来的无敌居中框

        if (vCode) {
            // 1. 顶部提示语
            hintHtml = `
                <div style="text-align: center; margin: 10px 0 5px 0;">
                    <span style="display: inline-block; background: rgba(255,105,180,0.1); color: #ff69b4; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: bold; border: 1px dashed #ff69b4; letter-spacing: 1px;">
                        💡 点击下方验证码即可直接复制
                    </span>
                </div>
            `;

            // 2. 🌟 提取到最顶部的独立居中验证码（绝对免疫原邮件排版干扰）
            giantVCodeBox = `
                <div style="display: flex; justify-content: center; align-items: center; width: 100%; margin: 15px 0 25px 0; padding-bottom: 25px; border-bottom: 1px dashed rgba(0,0,0,0.1);">
                    <div style="display: inline-block; cursor: pointer; color: #ff69b4; font-size: 38px; font-weight: 900; border: 2px dashed #ff69b4; border-radius: 12px; padding: 15px 45px; background: #fff; box-shadow: 0 5px 20px rgba(255,105,180,0.25); letter-spacing: 4px; text-align: center; transition: transform 0.1s;"
                         onclick="window.copyToClipboard('${vCode}', '✅ 验证码 ${vCode} 已复制'); event.stopPropagation();"
                         onmousedown="this.style.transform='scale(0.95)'" 
                         onmouseup="this.style.transform='scale(1)'">
                        ${vCode}
                    </div>
                </div>
            `;

           // 3. 🌟 原邮件正文里的验证码只做温柔的高亮 (全面兼容所有老旧手机版)
const safeInlineHighlight = `<span style="background: rgba(255,105,180,0.1) !important; color: #ff69b4 !important; font-weight: bold !important; padding: 2px 6px !important; border-radius: 4px !important; border-bottom: 2px solid #ff69b4 !important;">${vCode}</span>`;
const safeRegex = new RegExp('\\b' + vCode + '\\b', 'g'); // 🔑 核心修复：换成最稳定的 \b 语法
content = content.replace(safeRegex, safeInlineHighlight);
        }

        // 4. 组装弹窗：把巨型验证码框放在白底正文的最前面！
        document.getElementById('modalEmailContent').innerHTML = `
            ${hintHtml}
            <div class="mail-meta-group" style="padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1);">
                <div class="meta-item" style="color:rgba(255,255,255,0.8); margin-bottom: 4px;">👤 发件：${mail.from}</div>
                <div class="meta-item" style="color:rgba(255,255,255,0.8); margin-bottom: 4px;">📅 时间：${timeString}</div>
                <div class="subject-item" style="font-size: 16px; color: #fff; margin-top: 8px !important; font-weight: bold;">📑 主题：${mail.subject}</div>
            </div>
            <div class="mail-content-hd">
                ${giantVCodeBox} ${content}
            </div>
        `;

        document.querySelectorAll('.email-modal-overlay').forEach(m => {
            if (m.parentNode !== document.body) document.body.appendChild(m);
            m.style.display = 'flex';
        });
        document.body.classList.add('no-scroll', 'hide-ui-for-modal'); 
    };
    // 🚀 一键复制体验激活码功能
        function copyTrialCode(code) {
            // 使用现代浏览器的剪贴板 API
            if (navigator.clipboard) {
                navigator.clipboard.writeText(code).then(() => {
                    // 如果你的页面有 showToast 提示框，就用弹窗提示；如果没有，就用浏览器原生的 alert
                    if (typeof showToast === 'function') {
                        showToast('✅ 体验激活码复制成功：' + code);
                    } else {
                        alert('✅ 体验激活码复制成功：\n' + code + '\n快去使用吧！');
                    }
                }).catch(err => {
                    console.error('复制失败', err);
                });
            } else {
                // 兼容老版本浏览器
                const textArea = document.createElement("textarea");
                textArea.value = code;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    if (typeof showToast === 'function') {
                        showToast('✅ 体验激活码复制成功：' + code);
                    } else {
                        alert('✅ 体验激活码复制成功：\n' + code);
                    }
                } catch (err) {
                    console.error('复制失败', err);
                }
                document.body.removeChild(textArea);
            }
        }
</script>
