<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG筑梦电子 - 临时邮箱激活码系统</title>
    <style>
        :root {
            --primary: #00f2ff;
            --accent: #ff00ff;
            /* 2. 极限透明度：把透明度降到 0.15，让背景图最大程度透显 */
            --card-bg: rgba(0, 0, 0, 0.15); 
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #0a0a0c !important; 
            background-image: url('./bg2.JPG') !important;
            background-repeat: no-repeat !important;
            background-position: center center !important;
            background-attachment: fixed !important;
            background-size: cover !important;
            color: #fff;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative; z-index: 10;
            width: 90%; max-width: 450px; padding: 40px;
            background: var(--card-bg) !important;
            /* 降低毛玻璃模糊度，让背景更清晰 */
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); 
            border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* 标题分色保留 + 3D 立体阴影 */
        .title-container {
            display: flex !important;
            flex-direction: row !important;
            justify-content: center; align-items: center;
            gap: 10px; margin-bottom: 35px; width: 100%;
        }
        
        .title-left-3d {
            font-size: 24px; font-weight: 900;
            color: var(--primary); 
            text-shadow: 0 1px 0 #008a91, 0 2px 0 #00767c, 0 3px 0 #006267, 0 4px 5px rgba(0,0,0,0.5);
        }

        .title-right-3d {
            font-size: 24px; font-weight: 900;
            background: linear-gradient(to right, var(--primary), var(--accent)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 1px 0 #b300b3) drop-shadow(0 2px 0 #8a008a) drop-shadow(0 3px 0 #660066) drop-shadow(0 4px 5px rgba(0,0,0,0.5));
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 13px; color: #bbb; margin-bottom: 8px; font-weight: bold; }
        
        input {
            width: 100%; padding: 15px; box-sizing: border-box;
            background: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 12px; color: #fff; font-size: 16px; outline: none;
        }
        input::placeholder { color: #aaa !important; opacity: 1; }

        /* 1. 彻底隐藏数量框的上下箭头，保持和文本域右侧统一干净 */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        /* 全局细微滚动条样式 (文本域溢出时显示) */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }

        .action-btn-group {
            display: flex; gap: 12px; margin-top: 25px;
        }

        .btn-main-3d {
            padding: 16px; border: none; border-radius: 12px; font-weight: bold; font-size: 15px;
            cursor: pointer; transition: 0.1s; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(45deg, var(--primary), var(--accent)) !important;
            color: #000 !important; 
            box-shadow: 0 4px 0 #b300b3, 0 6px 15px rgba(0, 0, 0, 0.4);
        }
        .btn-main-3d:active { transform: translateY(3px); box-shadow: 0 1px 0 #b300b3, 0 3px 8px rgba(0, 0, 0, 0.3); }
        
        .btn-gen { flex: 1; } 
        .btn-copy { width: 100px; } 

        .result-wrapper { margin-top: 25px; position: relative; }
        
        /* 3. 激活码显示框：文字居中 + 粗体 */
        textarea {
            width: 100%; height: 120px; box-sizing: border-box;
            background: rgba(0,0,0,0.3) !important; /* 内部框稍微深一点点衬托绿色字体 */
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px; color: #0f0; 
            padding: 30px 20px; text-align: center; line-height: 1.8;
            font-family: monospace; resize: none; outline: none;
            font-weight: bold; /* 激活码变为粗体 */
        }

        .nav-group { display: flex; gap: 12px; margin-top: 25px; }
        .btn-nav-3d {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            color: white !important; font-weight: bold; font-size: 14px;
            cursor: pointer; transition: 0.1s;
            background: #ff69b4 !important;
            box-shadow: 0 4px 0 #d1448b, 0 6px 10px rgba(0, 0, 0, 0.3);
        }
        .btn-nav-3d:active { transform: translateY(2px); box-shadow: 0 2px 0 #d1448b, 0 3px 5px rgba(0, 0, 0, 0.2); }

        .status { 
            font-size: 11px; margin-top: 25px; line-height: 1.5; 
            color: white; font-weight: bold; 
        }

        /* 4. 全新轻提示 (Toast) 样式 - 绝对居中 */
        #toast {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* 绝对居中核心 */
            background: rgba(20, 20, 25, 0.95); /* 深色半透明 */
            color: #fff;
            padding: 16px 32px;
            border-radius: 12px;
            border: 1px solid rgba(0, 242, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 9999;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            white-space: nowrap; /* 保持提示语在一行 */
        }

        @keyframes glow {
            from { filter: brightness(1) drop-shadow(0 0 2px var(--primary)); }
            to { filter: brightness(1.5) drop-shadow(0 0 8px var(--primary)); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title-container">
            <span class="title-left-3d">LG筑梦电子</span>
            
            <svg viewBox="0 0 24 24" style="width: 32px; height: 32px; fill: none; stroke: var(--primary); stroke-width: 1.5; animation: glow 2s infinite alternate;">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
            </svg>

            <span class="title-right-3d">临时邮箱激活码系统</span>
        </div>
        
        <div class="input-group">
            <label>站长/代理商管理密码</label>
            <input type="password" id="secret" placeholder="请输入管理员密码">
        </div>

        <div class="input-group">
            <label>生成数量</label>
            <input type="number" id="count" value="1">
        </div>

        <div class="action-btn-group">
            <button class="btn-main-3d btn-gen" onclick="generate()">⚡ 激活码生成</button>
            <button class="btn-main-3d btn-copy" onclick="copyAll()">一键复制</button>
        </div>

        <div class="result-wrapper">
            <textarea id="result" readonly placeholder="激活码将在此处显示..."></textarea>
        </div>

        <div class="nav-group">
            <button onclick="window.location.href='../mail.html'" class="btn-nav-3d">📧 返回邮箱</button>
            <button onclick="window.location.href='../index.html'" class="btn-nav-3d">🏠 返回主页</button>
        </div>

        <div class="status">💡 如需开通生成权限，请返回主页底部联系站长微信获取代理</div>
    </div>

    <div id="toast"></div>

    <script>
        // 4. 新的轻提示逻辑：居中显示，3秒后自动消失
        let toastTimeout;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            
            // 清除之前的定时器，防止连续点击导致闪烁
            if(toastTimeout) clearTimeout(toastTimeout);
            
            // 3秒后自动隐藏
            toastTimeout = setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        async function generate() {
            const secret = document.getElementById('secret').value;
            const count = document.getElementById('count').value;
            const btn = document.querySelector('button[onclick="generate()"]');
            const resultArea = document.getElementById('result');

            if(!secret) {
                showToast('⚠️ 请输入站长/代理商管理密码！');
                return;
            }

            btn.innerText = '正在生成...';
            
            try {
                const response = await fetch('https://guo.roselg.xyz/api/admin/generate_codes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ secret, count })
                });
                
                const data = await response.json();
                
                if(data.codes && data.codes.length > 0) {
                    // 3. 核心修改：用多个空格拼接取代换行符 (\n)，实现多排多列的自动换行方阵居中
                    resultArea.value = data.codes.join('   '); 
                } else {
                    showToast('❌ 失败：' + (data.error || '密码不对或系统故障'));
                }
            } catch (err) {
                showToast('🚫 无法连接服务器，请检查后端状态');
            } finally {
                btn.innerText = '⚡ 激活码生成';
            }
        }

        function copyAll() {
            const area = document.getElementById('result');
            if(!area.value || area.value === '激活码将在此处显示...') {
                showToast('❌ 还没有激活码可以复制哦');
                return;
            }
            area.select();
            area.setSelectionRange(0, 99999);
            document.execCommand('copy');
            showToast('📋 激活码已全部存入剪贴板！');
        }
    </script>
</body>
</html>
