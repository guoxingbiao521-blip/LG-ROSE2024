<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌹 LG筑梦电子 - 临时邮箱激活码系统 🌹</title>
    <style>
        :root {
            --primary: #00f2ff;
            --accent: #ff00ff;
            --card-bg: rgba(0, 0, 0, 0.15); 
        }

      /* ==========================================
           1. 基础容器设置 (保留 flex 居中，剥离背景)
           ========================================== */
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
            
            /* 保持激活码卡片在屏幕正中间 */
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            overflow-y: auto;
        }

        /* ==========================================
           2. 终极背景幕布 (彻底解决 iOS 放大 Bug)
           ========================================== */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            
            background-color: #0a0a0c !important;
            background-size: cover !important;
            background-position: center center !important;
            background-repeat: no-repeat !important;

            /* 💻 默认加载：电脑大屏壁纸 */
            background-image: url('./bg2.JPG') !important; 
        }

        /* ==========================================
           3. 📱 平板与折叠屏专属壁纸
           ========================================== */
        @media (max-width: 1050px) {
            body::before {
                background-image: url('./ipadadmin.jpg') !important;
            }
        }

        /* ==========================================
           4. 📱 手机竖屏专属壁纸
           ========================================== */
        @media (max-width: 600px) {
            body::before {
                background-image: url('./iphoneadmin.jpg') !important;
            }
        }

        .container {
            position: relative; z-index: 10;
            width: 90%; max-width: 450px; padding: 40px;
            background: var(--card-bg) !important;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); 
            border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            margin: 0 auto; 
        }

        .title-container {
            display: flex !important;
            flex-direction: row !important;
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 35px; width: 100%;
        }
        
        .title-left-3d, .title-right-3d {
            font-size: 28px; font-weight: 900; 
        }
        .title-left-3d {
            color: var(--primary); 
            text-shadow: 0 1px 0 #008a91, 0 2px 0 #00767c, 0 3px 0 #006267, 0 4px 5px rgba(0,0,0,0.5);
        }
        .title-right-3d {
            background: linear-gradient(to right, var(--primary), var(--accent)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 1px 0 #b300b3) drop-shadow(0 2px 0 #8a008a) drop-shadow(0 3px 0 #660066) drop-shadow(0 4px 5px rgba(0,0,0,0.5));
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { 
            display: block; font-size: 13px; color: #fff; margin-bottom: 8px; font-weight: bold; 
            text-shadow: 0 1px 3px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.8); 
        }
        
        input {
            width: 100%; padding: 15px; box-sizing: border-box;
            background: rgba(0, 0, 0, 0.35) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            border-radius: 12px; color: #fff; font-size: 16px; outline: none;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            font-weight: bold;
        }
        input::placeholder { color: rgba(255,255,255,0.6) !important; opacity: 1; text-shadow: none; font-weight: normal; }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            opacity: 1; cursor: pointer;
            background-color: rgba(255, 255, 255, 0.25);
            border-radius: 6px; 
            width: 14px; 
            border-left: 1px solid rgba(0,0,0,0.2);
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.25); border-radius: 6px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }

        .action-btn-group { display: flex; gap: 12px; margin-top: 25px; }
        .btn-main-3d {
            padding: 16px; border: none; border-radius: 12px; font-weight: bold; font-size: 15px;
            cursor: pointer; transition: all 0.2s ease; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(45deg, var(--primary), var(--accent)) !important;
            color: #000 !important; 
            box-shadow: 0 4px 0 #b300b3, 0 6px 15px rgba(0, 0, 0, 0.4);
        }

        .btn-main-3d:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #b300b3, 0 8px 20px rgba(0, 242, 255, 0.3);
        }

        .btn-main-3d:active { transform: translateY(3px); box-shadow: 0 1px 0 #b300b3, 0 3px 8px rgba(0, 0, 0, 0.3); }
        .btn-gen { flex: 1; } 
        .btn-copy { width: 100px; } 

        .result-wrapper { margin-top: 25px; position: relative; }

        .single-copy-hint, .status {
            font-size: 12px; line-height: 1.5; 
            color: white; font-weight: bold; 
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
        }
        .single-copy-hint { display: none; margin-bottom: 8px; }
        .status { margin-top: 25px; }
        
        .result-box-style {
            width: 100%; height: 140px; box-sizing: border-box;
            background: rgba(0, 0, 0, 0.35) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            border-radius: 12px; padding: 15px; 
            overflow-y: auto; 
            display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 15px;
        }

        .result-box-style span, .code-tag {
            color: #0f0 !important;
            font-family: 'Segoe UI', system-ui, sans-serif !important;
            font-size: 15px !important; 
            font-weight: bold !important;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        .code-tag {
            cursor: pointer; transition: 0.2s;
            background: transparent; border: none; padding: 2px 5px;
        }
        .code-tag:hover {
            transform: scale(1.08);
            text-shadow: 0 0 10px #0f0;
        }
        .code-tag:active { transform: scale(0.95); }

        .nav-group { display: flex; gap: 12px; margin-top: 25px; }
        .btn-nav-3d {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            color: white !important; font-weight: bold; font-size: 14px;
            cursor: pointer; transition: all 0.2s ease;
            background: #ff69b4 !important;
            box-shadow: 0 4px 0 #d1448b, 0 6px 10px rgba(0, 0, 0, 0.3);
        }

        .btn-nav-3d:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #d1448b, 0 8px 15px rgba(209, 68, 139, 0.4);
        }

        .btn-nav-3d:active { transform: translateY(2px); box-shadow: 0 2px 0 #d1448b, 0 3px 5px rgba(0, 0, 0, 0.2); }

        #toast {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); 
            background: rgba(15, 15, 20, 0.95); 
            color: #fff; padding: 16px 32px; border-radius: 12px;
            border: 1px solid rgba(0, 242, 255, 0.4);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            z-index: 9999; font-size: 15px; font-weight: bold;
            text-align: center; white-space: nowrap; 
        }

        /* 🔥 【完美手机端适配】规则完全同步邮箱系统逻辑 */
        @media (max-width: 600px) {
            * { box-sizing: border-box !important; }
            body { padding: 10px !important; }
            
            /* 1. 容器宽度拉满 */
            .container { 
                width: 100% !important; 
                padding: 25px 15px !important; 
                border-radius: 18px !important;
            }

            /* 2. 标题大幅缩小，防止溢出 (16px) */
            .title-left-3d, .title-right-3d { 
                font-size: 16px !important; 
                letter-spacing: 0.5px !important; 
                white-space: nowrap !important;
            }
            .title-container svg { width: 24px !important; height: 24px !important; }

            /* 3. 按钮组变更为“换行堆叠” */
            .action-btn-group, .nav-group { 
                flex-wrap: wrap !important; 
                gap: 8px !important; 
            }

            /* 4. 按钮尺寸微调与排序 */
            .btn-main-3d, .btn-nav-3d { 
                flex: 1 1 45% !important; /* 一行排两个 */
                padding: 12px 5px !important; 
                font-size: 12px !important; 
                white-space: nowrap !important;
            }

            /* 5. 生成按钮独占第一行，增强点击欲望 */
            .btn-gen { 
                flex: 1 1 100% !important; 
                order: 1 !important; 
                font-size: 14px !important;
            }
            .btn-copy { order: 2 !important; }

            /* 6. 激活码结果框文字微调 */
            .result-box-style span, .code-tag { font-size: 13px !important; }
            
            /* 7. 提示文字极限压缩，防止撑开页面 */
            .single-copy-hint, .status { 
                font-size: 10px !important; 
                letter-spacing: -0.5px !important;
                line-height: 1.3 !important;
            }
        }

        @keyframes glow {
            from { filter: brightness(1) drop-shadow(0 0 2px var(--primary)); }
            to { filter: brightness(1.5) drop-shadow(0 0 8px var(--primary)); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title-container">
            <span class="title-left-3d">LG筑梦电子</span>
            <svg viewBox="0 0 24 24" style="width: 32px; height: 32px; fill: none; stroke: var(--primary); stroke-width: 1.5; animation: glow 2s infinite alternate; flex-shrink: 0;">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            <span class="title-right-3d">临时邮箱激活码系统</span>
        </div>
        
        <div class="input-group">
            <label>站长/代理商管理密码</label>
            <input type="password" id="secret" placeholder="请输入管理员密码">
        </div>

        <div class="input-group">
            <label>生成数量</label>
            <input type="number" id="count" value="1">
        </div>

        <div class="action-btn-group">
            <button class="btn-main-3d btn-gen" onclick="generate()">⚡ 激活码生成</button>
            <button class="btn-main-3d btn-copy" onclick="copyAll()">一键复制</button>
        </div>

        <div class="result-wrapper">
            <div id="singleCopyHint" class="single-copy-hint">💡 如需单独复制某个激活码，请直接点击该激活码！</div>
            <div id="resultBox" class="result-box-style">
                <span>激活码将在此处显示...</span>
            </div>
        </div>

        <div class="nav-group">
            <button onclick="window.location.href='../mail.html'" class="btn-nav-3d">📧 返回邮箱</button>
            <button onclick="window.location.href='../index.html'" class="btn-nav-3d">🏠 返回主页</button>
        </div>

        <div class="status">💡 如需开通生成权限，请返回主页底部联系站长微信获取代理</div>
    </div>

    <div id="toast"></div>

    <script>
        // JS 逻辑保持不变...
        let toastTimeout;
        let globalCodes = []; 

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            if(toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed"; top: 0; left: 0;
            document.body.appendChild(textArea);
            textArea.focus(); textArea.select();
            try { document.execCommand('copy'); } catch (err) {}
            document.body.removeChild(textArea);
        }
        function copyTextToClipboard(text, successMsg) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => showToast(successMsg)).catch(() => {
                    fallbackCopy(text); showToast(successMsg);
                });
            } else {
                fallbackCopy(text); showToast(successMsg);
            }
        }

        function copySingleCode(code) {
            copyTextToClipboard(code, '✅ 已单独复制：' + code);
        }

        async function generate() {
            const secret = document.getElementById('secret').value;
            const count = document.getElementById('count').value;
            const resultBox = document.getElementById('resultBox');
            const hint = document.getElementById('singleCopyHint');

            if(!secret) {
                showToast('⚠️ 请输入站长/代理商管理密码！');
                return;
            }

            hint.style.display = 'none';
            resultBox.innerHTML = '<span>正在生成激活码...</span>';
            
            try {
                const response = await fetch('https://guo.roselg.xyz/api/admin/generate_codes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ secret, count })
                });
                
                const data = await response.json();
                
                if(data.codes && data.codes.length > 0) {
                    globalCodes = data.codes;
                    
                    let htmlContent = '';
                    data.codes.forEach(code => {
                        htmlContent += `<div class="code-tag" onclick="copySingleCode('${code}')">${code}</div>`;
                    });
                    
                    resultBox.innerHTML = htmlContent;
                    
                    if(data.codes.length > 1) {
                        hint.style.display = 'block';
                    }
                    
                    showToast('🎉 您的激活已生成');

                } else {
                    resultBox.innerHTML = '<span>激活码将在此处显示...</span>';
                    showToast('❌ 失败：' + (data.error || '密码不对或系统故障'));
                }
            } catch (err) {
                resultBox.innerHTML = '<span>激活码将在此处显示...</span>';
                showToast('🚫 无法连接服务器，请检查后端状态');
            }
        }

        function copyAll() {
            if(globalCodes.length === 0) {
                showToast('❌ 还没有激活码可以复制哦');
                return;
            }
            copyTextToClipboard(globalCodes.join('\n'), '📋 激活码已全部存入剪贴板！');
        }
    </script>
</body>
</html>
