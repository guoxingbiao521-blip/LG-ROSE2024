<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG筑梦电子 - 临时邮箱激活码系统</title>
    <style>
        :root {
            --primary: #00f2ff;
            --accent: #ff00ff;
            --card-bg: rgba(0, 0, 0, 0.7);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: url('bg2.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative; z-index: 10;
            width: 90%; max-width: 450px; padding: 40px;
            background: var(--card-bg) !important;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .title-3d-full {
            font-size: 24px; font-weight: 900;
            margin-bottom: 35px; line-height: 1.4;
            color: var(--primary);
            text-shadow: 
                0 1px 0 #008a91, 0 2px 0 #00767c, 
                0 3px 0 #006267, 0 4px 0 #004e52,
                0 5px 0 #b300b3, 0 6px 0 #8a008a,
                0 7px 0 #660066, 0 8px 15px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 13px; color: #bbb; margin-bottom: 8px; font-weight: bold; }
        
        input {
            width: 100%; padding: 15px; box-sizing: border-box;
            background: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 12px; color: #fff; font-size: 16px; outline: none;
        }
        input::placeholder { color: #888 !important; opacity: 1; }
        input:focus { border-color: var(--primary) !important; background: rgba(255, 255, 255, 0.15) !important; }

        .btn-gen-3d {
            width: 100%; padding: 16px; margin-top: 10px; border: none;
            border-radius: 12px; font-weight: bold; cursor: pointer;
            background: linear-gradient(45deg, var(--primary), var(--accent)) !important;
            color: #000 !important; transition: 0.1s;
            box-shadow: 0 5px 0 #b300b3, 0 8px 15px rgba(0, 0, 0, 0.4);
        }
        .btn-gen-3d:active { 
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b300b3, 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .nav-group { display: flex; gap: 12px; margin-top: 15px; }
        .btn-nav-3d {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            color: white !important; font-weight: bold; font-size: 14px;
            cursor: pointer; transition: 0.1s;
            background: #ff69b4 !important;
            box-shadow: 0 4px 0 #d1448b, 0 6px 10px rgba(0, 0, 0, 0.3);
        }
        .btn-nav-3d:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #d1448b, 0 3px 5px rgba(0, 0, 0, 0.2);
        }

        .result-wrapper { margin-top: 30px; position: relative; }
        textarea {
            width: 100%; height: 120px; box-sizing: border-box;
            background: rgba(0,0,0,0.6) !important; border: 1px solid #444 !important;
            border-radius: 12px; color: #0f0; padding: 15px; font-family: monospace; resize: none; outline: none;
        }
        .copy-btn {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255, 255, 255, 0.2); padding: 5px 12px;
            font-size: 11px; color: #fff; border: none; border-radius: 6px; cursor: pointer; width: auto !important;
        }

        .status { font-size: 11px; color: #999; margin-top: 25px; line-height: 1.5; }

        #customModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #1a1a1e; border: 1px solid var(--primary);
            padding: 30px; border-radius: 20px; width: 280px; text-align: center;
        }
        .modal-btn { margin-top: 20px; background: var(--primary); color: #000; border: none; padding: 10px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        @keyframes glow {
            from { filter: brightness(1) drop-shadow(0 0 2px var(--primary)); }
            to { filter: brightness(1.5) drop-shadow(0 0 8px var(--primary)); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title-3d-full">
            <span>LG筑梦电子</span>
            <div style="display: flex; align-items: center; gap: 10px;">
                <svg viewBox="0 0 24 24" style="width: 32px; height: 32px; fill: none; stroke: var(--primary); stroke-width: 1.5; animation: glow 2s infinite alternate;">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                <span style="color: var(--accent);">临时邮箱激活码系统</span>
            </div>
        </div>
        
        <div class="input-group">
            <label>站长/代理商管理密码</label>
            <input type="password" id="secret" placeholder="请输入管理员密码">
        </div>

        <div class="input-group">
            <label>生成数量</label>
            <input type="number" id="count" value="1">
        </div>

        <button class="btn-gen-3d" onclick="generate()">⚡ 激活码生成</button>

        <div class="nav-group">
            <button onclick="window.location.href='../mail.html'" class="btn-nav-3d">📧 返回邮箱</button>
            <button onclick="window.location.href='../index.html'" class="btn-nav-3d">🏠 返回主页</button>
        </div>

        <div class="result-wrapper">
            <textarea id="result" readonly placeholder="激活码将在此处显示..."></textarea>
            <button class="copy-btn" onclick="copyAll()">一键复制</button>
        </div>

        <div class="status">💡 如需开通生成权限，请返回主页底部联系站长微信获取代理</div>
    </div>

    <div id="customModal">
        <div class="modal-content">
            <p id="modalMsg" style="margin:0; color:#fff; line-height:1.6;"></p>
            <button class="modal-btn" onclick="closeModal()">确定</button>
        </div>
    </div>

    <script>
        function showModal(msg) {
            document.getElementById('modalMsg').innerText = msg;
            document.getElementById('customModal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('customModal').style.display = 'none';
        }

        async function generate() {
            const secret = document.getElementById('secret').value;
            const count = document.getElementById('count').value;
            const btn = document.querySelector('button[onclick="generate()"]');
            const resultArea = document.getElementById('result');

            if(!secret) {
                showModal('⚠️ 请输入站长/代理商管理密码！');
                return;
            }

            btn.innerText = '正在生成激活码...';
            
            try {
                const response = await fetch('https://guo.roselg.xyz/api/admin/generate_codes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ secret, count })
                });
                const data = await response.json();
                if(data.codes && data.codes.length > 0) {
                    resultArea.value = data.codes.join('\n');
                } else {
                    showModal('❌ 失败：' + (data.error || '密码不对或系统故障'));
                }
            } catch (err) {
                showModal('🚫 无法连接服务器，请检查后端状态');
            } finally {
                btn.innerText = '⚡ 激活码生成';
            }
        }

        function copyAll() {
            const area = document.getElementById('result');
            if(!area.value || area.value === '激活码将在此处显示...') {
                showModal('❌ 还没有激活码可以复制哦');
                return;
            }
            area.select();
            area.setSelectionRange(0, 99999);
            document.execCommand('copy');
            showModal('📋 激活码已全部存入剪贴板！');
        }
    </script>
</body>
</html>
