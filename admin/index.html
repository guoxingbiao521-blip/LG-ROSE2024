<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LG筑梦电子 - 临时邮箱激活码系统</title>
    <style>
        :root {
            --primary: #00f2ff;
            --accent: #ff00ff;
            /* 2. 极限透明度：调低到 0.15，让绝美背景图大面积透出 */
            --card-bg: rgba(0, 0, 0, 0.15); 
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #0a0a0c !important; 
            background-image: url('./bg2.JPG') !important;
            background-repeat: no-repeat !important;
            background-position: center center !important;
            background-attachment: fixed !important;
            background-size: cover !important;
            color: #fff;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 6. 手机端绝对居中容器 */
        .container {
            position: relative; z-index: 10;
            width: 90%; max-width: 450px; padding: 40px;
            background: var(--card-bg) !important;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); 
            border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            /* 居中保障 */
            margin: 0 auto; 
        }

        /* 4. 主标题放大并撑满：justify-content: space-between */
        .title-container {
            display: flex !important;
            flex-direction: row !important;
            justify-content: space-between; /* 左右撑满边距 */
            align-items: center;
            margin-bottom: 35px; width: 100%;
        }
        
        .title-left-3d {
            font-size: 28px; font-weight: 900; /* 调大字号 */
            color: var(--primary); 
            text-shadow: 0 1px 0 #008a91, 0 2px 0 #00767c, 0 3px 0 #006267, 0 4px 5px rgba(0,0,0,0.5);
        }

        .title-right-3d {
            font-size: 28px; font-weight: 900; /* 调大字号 */
            background: linear-gradient(to right, var(--primary), var(--accent)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 1px 0 #b300b3) drop-shadow(0 2px 0 #8a008a) drop-shadow(0 3px 0 #660066) drop-shadow(0 4px 5px rgba(0,0,0,0.5));
        }

        /* 1. 提升文字清晰度：加上深色发光阴影，防透明背景干扰 */
        .input-group { margin-bottom: 20px; text-align: left; }
        label { 
            display: block; font-size: 13px; color: #fff; margin-bottom: 8px; font-weight: bold; 
            text-shadow: 0 1px 3px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.8); /* 极强文字阴影保底 */
        }
        
        input {
            width: 100%; padding: 15px; box-sizing: border-box;
            background: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            border-radius: 12px; color: #fff; font-size: 16px; outline: none;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8); /* 输入框内文字加阴影 */
            font-weight: bold;
        }
        input::placeholder { color: rgba(255,255,255,0.7) !important; opacity: 1; text-shadow: none; font-weight: normal; }

        /* 2. 数量框箭头改头换面，变得和下发滚动条风格一致可见 */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            opacity: 1;
            /* 利用反相滤镜，将其变成亮色半透明，契合暗黑主题 */
            filter: invert(1) opacity(0.5); 
            cursor: pointer;
        }

        /* 全局细长半透明滚动条 (文本域溢出时显示) */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.25); border-radius: 6px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.5); }

        .action-btn-group {
            display: flex; gap: 12px; margin-top: 25px;
        }

        .btn-main-3d {
            padding: 16px; border: none; border-radius: 12px; font-weight: bold; font-size: 15px;
            cursor: pointer; transition: 0.1s; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(45deg, var(--primary), var(--accent)) !important;
            color: #000 !important; 
            box-shadow: 0 4px 0 #b300b3, 0 6px 15px rgba(0, 0, 0, 0.4);
        }
        .btn-main-3d:active { transform: translateY(3px); box-shadow: 0 1px 0 #b300b3, 0 3px 8px rgba(0, 0, 0, 0.3); }
        
        .btn-gen { flex: 1; } 
        .btn-copy { width: 100px; } 

        .result-wrapper { margin-top: 25px; position: relative; }

        /* 3. 新增的独立复制提示语 */
        .single-copy-hint {
            display: none; /* 默认隐藏，生成后显示 */
            font-size: 12px; color: #ff69b4; margin-bottom: 8px; font-weight: bold;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }
        
        /* 3. & 5. 高级显示框：取代原来的 textarea，支持内部点击和方阵排版 */
        .result-box-style {
            width: 100%; height: 140px; box-sizing: border-box;
            background: rgba(0,0,0,0.35) !important; 
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            border-radius: 12px; color: #0f0; 
            padding: 15px; 
            overflow-y: auto; /* 超出自动显示滚动条 */
            /* 方阵绝对居中核心代码 */
            display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 10px;
            font-family: 'Segoe UI', system-ui, sans-serif; /* 同步按钮字体 */
            font-weight: bold;
        }

        .placeholder-text {
            color: rgba(255,255,255,0.6); font-weight: normal; text-shadow: none;
        }

        /* 3. 独立激活码小标签样式 */
        .code-tag {
            background: rgba(0, 242, 255, 0.1); border: 1px solid var(--primary);
            color: var(--primary); padding: 8px 14px;
            border-radius: 8px; cursor: pointer; transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
            font-size: 15px; letter-spacing: 0.5px;
        }
        .code-tag:hover { background: var(--primary); color: #000; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0, 242, 255, 0.4); }
        .code-tag:active { transform: translateY(1px); }

        .nav-group { display: flex; gap: 12px; margin-top: 25px; }
        .btn-nav-3d {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            color: white !important; font-weight: bold; font-size: 14px;
            cursor: pointer; transition: 0.1s;
            background: #ff69b4 !important;
            box-shadow: 0 4px 0 #d1448b, 0 6px 10px rgba(0, 0, 0, 0.3);
        }
        .btn-nav-3d:active { transform: translateY(2px); box-shadow: 0 2px 0 #d1448b, 0 3px 5px rgba(0, 0, 0, 0.2); }

        .status { 
            font-size: 12px; margin-top: 25px; line-height: 1.5; 
            color: white; font-weight: bold; 
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
        }

        /* 轻提示 (Toast) 样式 - 绝对居中 */
        #toast {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); 
            background: rgba(15, 15, 20, 0.95); 
            color: #fff; padding: 16px 32px; border-radius: 12px;
            border: 1px solid rgba(0, 242, 255, 0.4);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            z-index: 9999; font-size: 15px; font-weight: bold;
            text-align: center; white-space: nowrap; 
        }

        /* 6. 移动端防换行、排版保护规则 */
        @media (max-width: 480px) {
            .container { padding: 30px 20px; width: 92%; }
            .title-left-3d, .title-right-3d { font-size: 18px; } /* 防止标题溢出屏幕 */
            
            /* 强制按钮同行，且文字坚决不换行 */
            .action-btn-group, .nav-group { flex-wrap: nowrap !important; gap: 8px; }
            .btn-main-3d, .btn-nav-3d { 
                white-space: nowrap !important; 
                padding: 14px 5px !important; 
                font-size: 13px !important; 
            }
            .btn-copy { width: auto; padding: 14px 10px !important; }
            
            /* 提示文字手机端防重叠微调 */
            .status { font-size: 11px; }
            .single-copy-hint { font-size: 11px; }
        }

        @keyframes glow {
            from { filter: brightness(1) drop-shadow(0 0 2px var(--primary)); }
            to { filter: brightness(1.5) drop-shadow(0 0 8px var(--primary)); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title-container">
            <span class="title-left-3d">LG筑梦电子</span>
            <svg viewBox="0 0 24 24" style="width: 32px; height: 32px; fill: none; stroke: var(--primary); stroke-width: 1.5; animation: glow 2s infinite alternate; flex-shrink: 0;">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            <span class="title-right-3d">临时邮箱激活码系统</span>
        </div>
        
        <div class="input-group">
            <label>站长/代理商管理密码</label>
            <input type="password" id="secret" placeholder="请输入管理员密码">
        </div>

        <div class="input-group">
            <label>生成数量</label>
            <input type="number" id="count" value="1">
        </div>

        <div class="action-btn-group">
            <button class="btn-main-3d btn-gen" onclick="generate()">⚡ 激活码生成</button>
            <button class="btn-main-3d btn-copy" onclick="copyAll()">一键复制</button>
        </div>

        <div class="result-wrapper">
            <div id="singleCopyHint" class="single-copy-hint">💡 如需单独复制某个激活码，请直接点击该激活码！</div>
            <div id="resultBox" class="result-box-style">
                <span id="placeholderText" class="placeholder-text">激活码将在此处显示...</span>
            </div>
        </div>

        <div class="nav-group">
            <button onclick="window.location.href='../mail.html'" class="btn-nav-3d">📧 返回邮箱</button>
            <button onclick="window.location.href='../index.html'" class="btn-nav-3d">🏠 返回主页</button>
        </div>

        <div class="status">💡 如需开通生成权限，请返回主页底部联系站长微信获取代理</div>
    </div>

    <div id="toast"></div>

    <script>
        let toastTimeout;
        let globalCodes = []; // 存储所有生成的码供一键复制使用

        // 居中轻提示函数
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            if(toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        // 剪贴板兼容函数 (因为移除了 Textarea)
        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed"; top: 0; left: 0;
            document.body.appendChild(textArea);
            textArea.focus(); textArea.select();
            try { document.execCommand('copy'); } catch (err) {}
            document.body.removeChild(textArea);
        }
        function copyTextToClipboard(text, successMsg) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => showToast(successMsg)).catch(() => {
                    fallbackCopy(text); showToast(successMsg);
                });
            } else {
                fallbackCopy(text); showToast(successMsg);
            }
        }

        // 3. 单击某个独立激活码的复制逻辑
        function copySingleCode(code) {
            copyTextToClipboard(code, '✅ 已单独复制：' + code);
        }

        async function generate() {
            const secret = document.getElementById('secret').value;
            const count = document.getElementById('count').value;
            const resultBox = document.getElementById('resultBox');
            const hint = document.getElementById('singleCopyHint');

            if(!secret) {
                showToast('⚠️ 请输入站长/代理商管理密码！');
                return;
            }

            // 5. 转移加载状态：按钮文字不动，在框内显示
            hint.style.display = 'none';
            resultBox.innerHTML = '<span style="color:var(--primary); font-weight:bold;">正在生成激活码...</span>';
            
            try {
                const response = await fetch('https://guo.roselg.xyz/api/admin/generate_codes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ secret, count })
                });
                
                const data = await response.json();
                
                if(data.codes && data.codes.length > 0) {
                    globalCodes = data.codes;
                    
                    // 3. 将数组转换为可点击的独立小标签
                    let htmlContent = '';
                    data.codes.forEach(code => {
                        htmlContent += `<div class="code-tag" onclick="copySingleCode('${code}')">${code}</div>`;
                    });
                    
                    resultBox.innerHTML = htmlContent;
                    
                    // 3. 如果数量 > 1，显示上方提示语
                    if(data.codes.length > 1) {
                        hint.style.display = 'block';
                    }
                    
                    // 5. 生成成功后的轻提示
                    showToast('🎉 您的激活已生成');

                } else {
                    resultBox.innerHTML = '<span class="placeholder-text">激活码将在此处显示...</span>';
                    showToast('❌ 失败：' + (data.error || '密码不对或系统故障'));
                }
            } catch (err) {
                resultBox.innerHTML = '<span class="placeholder-text">激活码将在此处显示...</span>';
                showToast('🚫 无法连接服务器，请检查后端状态');
            }
        }

        function copyAll() {
            if(globalCodes.length === 0) {
                showToast('❌ 还没有激活码可以复制哦');
                return;
            }
            copyTextToClipboard(globalCodes.join('\n'), '📋 激活码已全部存入剪贴板！');
        }
    </script>
</body>
</html>
